<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ColorGlass CRM WhatsApp MVP</title>
  <style>
    :root { --blue:#1079ba; --dark:#0f172a; --muted:#64748b; --border:#e2e8f0; --bg:#f8fafc; --white:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, sans-serif; background:var(--bg); color:var(--dark); }
    header { padding:14px 18px; background:var(--white); border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:center; justify-content:space-between; }
    h1 { font-size:18px; margin:0; color:var(--blue); }
    input, textarea, button { font:inherit; }
    input, textarea { border:1px solid var(--border); border-radius:10px; padding:10px; background:#fff; }
    button { border:0; border-radius:10px; padding:10px 14px; background:var(--blue); color:#fff; font-weight:700; cursor:pointer; }
    button.secondary { background:#e2e8f0; color:#0f172a; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .wrap { display:grid; grid-template-columns:330px 1fr; min-height:calc(100vh - 61px); }
    aside { border-right:1px solid var(--border); background:#fff; overflow:auto; }
    main { display:flex; flex-direction:column; min-width:0; }
    .toolbar { padding:12px; display:flex; gap:8px; border-bottom:1px solid var(--border); }
    .toolbar input { flex:1; }
    .item { padding:14px; border-bottom:1px solid var(--border); cursor:pointer; }
    .item:hover, .item.active { background:#eef7fc; }
    .name { font-weight:800; margin-bottom:4px; }
    .meta { color:var(--muted); font-size:12px; display:flex; justify-content:space-between; gap:8px; }
    .thread-head { padding:14px 18px; background:#fff; border-bottom:1px solid var(--border); }
    .messages { flex:1; overflow:auto; padding:18px; display:flex; flex-direction:column; gap:10px; }
    .bubble { max-width:min(680px, 82%); padding:10px 12px; border-radius:14px; line-height:1.35; white-space:pre-wrap; }
    .inbound { background:#fff; border:1px solid var(--border); align-self:flex-start; }
    .outbound { background:#dcfce7; align-self:flex-end; }
    .bubble small { display:block; margin-top:6px; color:var(--muted); font-size:11px; }
    .composer { padding:12px; background:#fff; border-top:1px solid var(--border); display:flex; gap:8px; }
    .composer textarea { flex:1; height:62px; resize:none; }
    .empty { color:var(--muted); padding:20px; }
    .badge { background:#ef4444; color:white; border-radius:999px; padding:2px 8px; font-size:12px; font-weight:800; }
    .status { font-size:12px; color:var(--muted); }
    @media (max-width: 800px) { .wrap { grid-template-columns:1fr; } aside { max-height:40vh; border-right:0; border-bottom:1px solid var(--border); } }
  </style>
</head>
<body>
  <header>
    <h1>ColorGlass CRM WhatsApp MVP</h1>
    <div style="display:flex; gap:8px; align-items:center;">
      <input id="password" placeholder="Senha do CRM" type="password" style="width:160px" />
      <button class="secondary" onclick="savePassword()">Salvar</button>
      <button onclick="loadConversations()">Atualizar</button>
    </div>
  </header>

  <div class="wrap">
    <aside>
      <div class="toolbar">
        <input id="filter" placeholder="Buscar conversa" oninput="renderConversations()" />
      </div>
      <div id="conversations"><div class="empty">Carregando...</div></div>
    </aside>

    <main>
      <div class="thread-head">
        <div class="name" id="threadTitle">Selecione uma conversa</div>
        <div class="status" id="threadStatus">Mensagens recebidas pelo webhook aparecerão aqui.</div>
      </div>
      <div class="messages" id="messages"><div class="empty">Nenhuma conversa selecionada.</div></div>
      <div class="composer">
        <textarea id="reply" placeholder="Digite a resposta pelo WhatsApp"></textarea>
        <button id="sendBtn" onclick="sendReply()" disabled>Enviar</button>
      </div>
    </main>
  </div>

  <script>
    let conversations = [];
    let selectedId = null;

    const $ = (id) => document.getElementById(id);

    function password() { return localStorage.getItem('crm_password') || ''; }
    function headers() { return { 'Content-Type': 'application/json', 'x-crm-password': password() }; }
    function fmt(value) { return value ? new Date(value).toLocaleString('pt-BR') : ''; }

    function savePassword() {
      localStorage.setItem('crm_password', $('password').value || '');
      loadConversations();
    }

    async function api(path, options = {}) {
      const res = await fetch(path, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || json.ok === false) throw new Error(json.error || 'Erro na requisição');
      return json;
    }

    async function loadConversations() {
      $('password').value = password();
      $('conversations').innerHTML = '<div class="empty">Carregando...</div>';
      try {
        const data = await api('/api/conversations');
        conversations = data.conversations || [];
        renderConversations();
      } catch (err) {
        $('conversations').innerHTML = `<div class="empty">${err.message}</div>`;
      }
    }

    function renderConversations() {
      const q = $('filter').value.toLowerCase().trim();
      const filtered = conversations.filter((c) => {
        const lead = c.crm_leads || {};
        return `${lead.name || ''} ${lead.phone || ''} ${c.wa_id || ''}`.toLowerCase().includes(q);
      });

      if (!filtered.length) {
        $('conversations').innerHTML = '<div class="empty">Nenhuma conversa.</div>';
        return;
      }

      $('conversations').innerHTML = filtered.map((c) => {
        const lead = c.crm_leads || {};
        const active = c.id === selectedId ? 'active' : '';
        const unread = c.unread_count ? `<span class="badge">${c.unread_count}</span>` : '';
        return `<div class="item ${active}" onclick="openConversation('${c.id}')">
          <div class="name">${escapeHtml(lead.name || 'Contato WhatsApp')}</div>
          <div class="meta"><span>${escapeHtml(lead.phone || '+' + c.wa_id)}</span>${unread}</div>
          <div class="meta"><span>${escapeHtml(c.status || 'open')}</span><span>${fmt(c.last_message_at)}</span></div>
        </div>`;
      }).join('');
    }

    async function openConversation(id) {
      selectedId = id;
      renderConversations();
      const c = conversations.find((item) => item.id === id);
      const lead = c?.crm_leads || {};
      $('threadTitle').textContent = lead.name || 'Contato WhatsApp';
      $('threadStatus').textContent = `${lead.phone || '+' + c.wa_id} • ${c.status || 'open'}`;
      $('sendBtn').disabled = false;
      $('messages').innerHTML = '<div class="empty">Carregando mensagens...</div>';

      try {
        const data = await api(`/api/conversations/${id}/messages`);
        renderMessages(data.messages || []);
        loadConversations();
      } catch (err) {
        $('messages').innerHTML = `<div class="empty">${err.message}</div>`;
      }
    }

    function renderMessages(messages) {
      if (!messages.length) {
        $('messages').innerHTML = '<div class="empty">Sem mensagens ainda.</div>';
        return;
      }
      $('messages').innerHTML = messages.map((m) => {
        const cls = m.direction === 'outbound' ? 'outbound' : 'inbound';
        return `<div class="bubble ${cls}">${escapeHtml(m.body || '')}<small>${fmt(m.created_at)} • ${escapeHtml(m.status || '')}</small></div>`;
      }).join('');
      $('messages').scrollTop = $('messages').scrollHeight;
    }

    async function sendReply() {
      const body = $('reply').value.trim();
      if (!selectedId || !body) return;
      $('sendBtn').disabled = true;
      try {
        await api(`/api/conversations/${selectedId}/reply`, { method:'POST', body: JSON.stringify({ body }) });
        $('reply').value = '';
        await openConversation(selectedId);
      } catch (err) {
        alert(err.message);
      } finally {
        $('sendBtn').disabled = false;
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, (c) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[c]));
    }

    loadConversations();
    setInterval(loadConversations, 15000);
  </script>
</body>
</html>
