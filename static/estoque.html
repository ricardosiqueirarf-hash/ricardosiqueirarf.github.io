<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Vídeo Original</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    width:100vw;
    height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* VIDEO */
.bg-video{
    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%, -50%);

    width:auto;
    height:auto;

    max-width:100vw;
    max-height:100vh;

    object-fit:contain;

    z-index:-1;

    image-rendering:auto;
}

</style>
</head>

<body>

<video
    class="bg-video"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
>
    <source
        src="https://hfhwvzldhgqniqnurync.supabase.co/storage/v1/object/public/teste/back.mp4"
        type="video/mp4"
    >
</video>

</body>
</html>
