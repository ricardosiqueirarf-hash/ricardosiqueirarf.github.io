<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste de Vídeo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #ffffff;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .texto {
      text-align: center;
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 700;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
    }
  </style>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://hfhwvzldhgqniqnurync.supabase.co/storage/v1/object/public/teste/back.mp4" type="video/mp4" />
  </video>

  <div class="texto">Teste de vídeo de fundo</div>
</body>
</html>
