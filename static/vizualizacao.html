<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informações do Orçamento | ColorGlass</title>
<link rel="icon" href="/favicon.ico?v=4" sizes="any">
<script src="global.js"></script>
<style>
:root{--cg-blue:#1079ba;--cg-blue-dark:#0d5d8c;--cg-blue-soft:#e7f3fb;--cg-white:#fff;--cg-text:#1f2933;--cg-muted:#6b7280;--cg-border:rgba(16,121,186,.12);--cg-shadow:0 12px 30px rgba(15,44,62,.12);--cg-shadow-soft:0 10px 24px rgba(15,44,62,.10)}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
body{min-height:100vh;background:radial-gradient(circle at top,rgba(16,121,186,.16),transparent 55%),linear-gradient(135deg,#f5fbff 0%,#eef4f9 45%,#f8fbff 100%);color:var(--cg-text)}
.app{display:grid;grid-template-columns:240px 1fr;gap:18px;padding:18px;min-height:100vh}
.sidebar{background:linear-gradient(135deg,var(--cg-blue),var(--cg-blue-dark));color:#fff;border-radius:18px;box-shadow:var(--cg-shadow);padding:22px 18px;display:flex;flex-direction:column;gap:12px;position:sticky;top:18px;height:calc(100vh - 36px)}
.sidebar h3{font-size:1.25rem;margin-bottom:8px;letter-spacing:.8px}.sidebar button{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:#fff;padding:12px;border-radius:12px;cursor:pointer;text-align:left;font-weight:800;transition:.2s ease}.sidebar button:hover{background:rgba(255,255,255,.22);transform:translateX(4px)}
.content{padding:22px;border-radius:18px;background:rgba(255,255,255,.62);border:1px solid rgba(16,121,186,.10);box-shadow:var(--cg-shadow-soft);backdrop-filter:blur(10px)}
.header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}h1{color:var(--cg-blue-dark);font-size:1.75rem;margin-bottom:6px}.subtitle{color:var(--cg-muted);font-weight:800;line-height:1.4}.status-pill{border-radius:999px;padding:8px 12px;font-weight:950;background:var(--cg-blue-soft);color:var(--cg-blue-dark);border:1px solid rgba(16,121,186,.18)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:14px;margin:16px 0 20px}.card{background:#fff;border:1px solid var(--cg-border);border-radius:18px;box-shadow:var(--cg-shadow-soft);padding:16px;position:relative;overflow:hidden}.card::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(16,121,186,.08),transparent 58%);opacity:.9;pointer-events:none}.card h2{color:var(--cg-blue);font-size:1.05rem;margin-bottom:12px;position:relative}.kpi-label{color:var(--cg-muted);font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:.04em;position:relative}.kpi-value{font-size:1.2rem;font-weight:950;color:var(--cg-blue-dark);margin-top:4px;position:relative}.info-list{display:grid;grid-template-columns:repeat(2,minmax(180px,1fr));gap:10px;position:relative}.info-item{background:rgba(248,251,255,.85);border:1px solid rgba(16,121,186,.10);border-radius:14px;padding:10px 12px}.info-item b{display:block;color:var(--cg-muted);font-size:.78rem;margin-bottom:4px}.info-item span{font-weight:850;color:#23313a;word-break:break-word}.table-wrap{overflow:auto;position:relative}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--cg-shadow-soft)}th,td{padding:12px;border:1px solid rgba(220,221,225,.85);text-align:left;vertical-align:top}th{background:linear-gradient(135deg,rgba(231,243,251,.95),rgba(231,243,251,.65));font-weight:900;color:#1f2933}td{font-weight:750;color:#374151}.empty{padding:20px;border-radius:16px;background:#fff;border:1px dashed rgba(16,121,186,.22);color:var(--cg-muted);font-weight:900;text-align:center}.error{background:#fff0f0;border:1px solid rgba(220,38,38,.25);color:#991b1b;padding:14px;border-radius:14px;font-weight:900;margin-bottom:14px}
@media(max-width:980px){.app{grid-template-columns:1fr}.sidebar{height:auto;position:relative;top:0;flex-direction:row;flex-wrap:wrap}.sidebar button{text-align:center;flex:1}.grid{grid-template-columns:1fr}.info-list{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h3>COLOR GLASS</h3>
    <button onclick="voltarOrcamentos()">Voltar para orçamentos</button>
  </aside>
  <main class="content">
    <div class="header"><div><h1>Informações do orçamento</h1><div class="subtitle" id="subtitulo">Carregando dados do orçamento...</div></div><div class="status-pill" id="statusPedido">Status</div></div>
    <div id="erroBox"></div>
    <section class="grid"><div class="card"><div class="kpi-label">Pedido</div><div class="kpi-value" id="kpiPedido">-</div></div><div class="card"><div class="kpi-label">Cliente</div><div class="kpi-value" id="kpiCliente">-</div></div><div class="card"><div class="kpi-label">Quantidade total</div><div class="kpi-value" id="kpiQtd">-</div></div><div class="card"><div class="kpi-label">Valor total</div><div class="kpi-value" id="kpiValor">-</div></div></section>
    <section class="card"><h2>Dados gerais</h2><div class="info-list" id="dadosGerais"></div></section>
    <section class="card" style="margin-top:18px;"><h2>Portas / itens do orçamento</h2><div id="portasBox" class="table-wrap"><div class="empty">Carregando itens...</div></div></section>
  </main>
</div>
<script>
const BACKEND_URL="https://colorglass.onrender.com";const params=new URLSearchParams(window.location.search);const ORCAMENTO_UUID=params.get('orcamento_uuid');
function tokenAtual(){return localStorage.getItem('USER_TOKEN')||params.get('token')||''}function tokenParam(prefix='&'){const token=tokenAtual();return token?`${prefix}token=${encodeURIComponent(token)}`:''}function authHeaders(){const token=tokenAtual();return token?{Authorization:`Bearer ${token}`}:{}}function moeda(v){const n=Number(v);return Number.isFinite(n)?`R$ ${n.toFixed(2)}`:'-'}function texto(v){return(v===null||v===undefined||v==='')?'-':String(v)}function dataLocal(v){const d=new Date(v);return Number.isNaN(d.getTime())?'-':d.toLocaleString('pt-BR')}function escapeHtml(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function voltarOrcamentos(){window.location.href='index_loja.html'+tokenParam('?')}
function renderInfoItem(label,value){return`<div class="info-item"><b>${escapeHtml(label)}</b><span>${escapeHtml(texto(value))}</span></div>`}
function renderOrcamento(o){const numero=o?.numero_pedido??o?.numero??'-';const cliente=o?.cliente_nome??o?.nome_cliente??o?.cliente??'-';const status=o?.status_label??o?.status??'-';document.getElementById('subtitulo').textContent=`${cliente} · Pedido #${numero}`;document.getElementById('statusPedido').textContent=`Status: ${status}`;document.getElementById('kpiPedido').textContent=`#${numero}`;document.getElementById('kpiCliente').textContent=cliente;document.getElementById('kpiQtd').textContent=texto(o?.quantidade_total);document.getElementById('kpiValor').textContent=moeda(o?.valor_total);document.getElementById('dadosGerais').innerHTML=[renderInfoItem('ID do orçamento',ORCAMENTO_UUID),renderInfoItem('Número do pedido',numero),renderInfoItem('Cliente',cliente),renderInfoItem('Cidade',o?.cliente_cidade??o?.cidade),renderInfoItem('LojaID',o?.lojaid??o?.lojaID??o?.storeID??o?.storeid),renderInfoItem('Status',status),renderInfoItem('Quantidade total',o?.quantidade_total),renderInfoItem('Valor total',moeda(o?.valor_total)),renderInfoItem('Data de criação',dataLocal(o?.data_criacao??o?.created_at)),renderInfoItem('Última atualização',dataLocal(o?.updated_at??o?.data_atualizacao))].join('')}
function valorCampo(obj,nomes){for(const nome of nomes){if(obj&&obj[nome]!==undefined&&obj[nome]!==null&&obj[nome]!=='')return obj[nome]}return'-'}
function renderPortas(portas){const box=document.getElementById('portasBox');if(!Array.isArray(portas)||!portas.length){box.innerHTML='<div class="empty">Nenhuma porta/item salvo neste orçamento.</div>';return}box.innerHTML=`<table><thead><tr><th>#</th><th>Tipologia</th><th>Dimensões</th><th>Qtd.</th><th>Vidro</th><th>Perfil / sistema</th><th>Valor</th></tr></thead><tbody>${portas.map((p,i)=>{const tipo=valorCampo(p,['tipo','tipologia','classe']);const largura=valorCampo(p,['largura','width']);const altura=valorCampo(p,['altura','height']);const qtd=valorCampo(p,['quantidade','qtd']);const vidro=valorCampo(p,['vidro_nome','vidro','vidro_id']);const perfil=valorCampo(p,['perfil_nome','perfil','perfil_id','sistema_nome','sistema','sistema_id']);const valor=valorCampo(p,['preco_total','valor_total','preco','valor']);return`<tr><td>${i+1}</td><td>${escapeHtml(tipo)}</td><td>${escapeHtml(largura)} × ${escapeHtml(altura)}</td><td>${escapeHtml(qtd)}</td><td>${escapeHtml(vidro)}</td><td>${escapeHtml(perfil)}</td><td>${escapeHtml(Number.isFinite(Number(valor))?moeda(valor):valor)}</td></tr>`}).join('')}</tbody></table>`}
async function carregar(){const erroBox=document.getElementById('erroBox');if(!ORCAMENTO_UUID){erroBox.innerHTML='<div class="error">UUID do orçamento não informado.</div>';return}try{const[orcamentosRes,portasRes]=await Promise.all([fetch(`${BACKEND_URL}/api/orcamentos`,{headers:authHeaders()}),fetch(`${BACKEND_URL}/api/orcamento/${encodeURIComponent(ORCAMENTO_UUID)}/portas`,{headers:authHeaders()})]);const orcamentosData=await orcamentosRes.json();const portasData=await portasRes.json();const lista=Array.isArray(orcamentosData?.orcamentos)?orcamentosData.orcamentos:[];const orcamento=lista.find(item=>String(item.id)===String(ORCAMENTO_UUID));if(!orcamento){erroBox.innerHTML='<div class="error">Orçamento não encontrado na lista de orçamentos.</div>'}else{renderOrcamento(orcamento)}renderPortas(portasData?.portas||[])}catch(err){console.error(err);erroBox.innerHTML='<div class="error">Erro ao carregar informações do orçamento.</div>'}}
carregar();
</script>
</body>
</html>
