<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informações do Orçamento | ColorGlass</title>
<link rel="icon" href="/favicon.ico?v=4" sizes="any">
<script src="global.js"></script>
<style>
:root{--cg-blue:#1079ba;--cg-blue-dark:#0d5d8c;--cg-blue-soft:#e7f3fb;--cg-white:#fff;--cg-text:#1f2933;--cg-muted:#6b7280;--cg-border:rgba(16,121,186,.12);--cg-shadow:0 12px 30px rgba(15,44,62,.12);--cg-shadow-soft:0 10px 24px rgba(15,44,62,.10)}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
body{min-height:100vh;background:radial-gradient(circle at top,rgba(16,121,186,.16),transparent 55%),linear-gradient(135deg,#f5fbff 0%,#eef4f9 45%,#f8fbff 100%);color:var(--cg-text)}
.app{display:grid;grid-template-columns:240px 1fr;gap:18px;padding:18px;min-height:100vh}.sidebar{background:linear-gradient(135deg,var(--cg-blue),var(--cg-blue-dark));color:#fff;border-radius:18px;box-shadow:var(--cg-shadow);padding:22px 18px;display:flex;flex-direction:column;gap:12px;position:sticky;top:18px;height:calc(100vh - 36px)}
.sidebar h3{font-size:1.25rem;margin-bottom:8px;letter-spacing:.8px}.sidebar button,.btn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:#fff;padding:12px;border-radius:12px;cursor:pointer;text-align:left;font-weight:800;transition:.2s ease}.sidebar button:hover{background:rgba(255,255,255,.22);transform:translateX(4px)}.btn{background:linear-gradient(135deg,var(--cg-blue),var(--cg-blue-dark));text-align:center;box-shadow:0 10px 18px rgba(16,121,186,.18)}.btn:hover{transform:translateY(-2px);box-shadow:0 14px 24px rgba(16,121,186,.24)}
.content{padding:22px;border-radius:18px;background:rgba(255,255,255,.62);border:1px solid rgba(16,121,186,.10);box-shadow:var(--cg-shadow-soft);backdrop-filter:blur(10px)}.header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}h1{color:var(--cg-blue-dark);font-size:1.75rem;margin-bottom:6px}.subtitle{color:var(--cg-muted);font-weight:800;line-height:1.4}.status-pill{border-radius:999px;padding:8px 12px;font-weight:950;background:var(--cg-blue-soft);color:var(--cg-blue-dark);border:1px solid rgba(16,121,186,.18)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:14px;margin:16px 0 20px}.card{background:#fff;border:1px solid var(--cg-border);border-radius:18px;box-shadow:var(--cg-shadow-soft);padding:16px;position:relative;overflow:hidden}.card::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(16,121,186,.08),transparent 58%);opacity:.9;pointer-events:none}.card h2{color:var(--cg-blue);font-size:1.05rem;margin-bottom:12px;position:relative}.kpi-label{color:var(--cg-muted);font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:.04em;position:relative}.kpi-value{font-size:1.2rem;font-weight:950;color:var(--cg-blue-dark);margin-top:4px;position:relative}.info-list{display:grid;grid-template-columns:repeat(2,minmax(180px,1fr));gap:10px;position:relative}.info-item{background:rgba(248,251,255,.85);border:1px solid rgba(16,121,186,.10);border-radius:14px;padding:10px 12px}.info-item b{display:block;color:var(--cg-muted);font-size:.78rem;margin-bottom:4px}.info-item span{font-weight:850;color:#23313a;word-break:break-word}.table-wrap{overflow:auto;position:relative}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--cg-shadow-soft)}th,td{padding:12px;border:1px solid rgba(220,221,225,.85);text-align:left;vertical-align:top}th{background:linear-gradient(135deg,rgba(231,243,251,.95),rgba(231,243,251,.65));font-weight:900;color:#1f2933}td{font-weight:750;color:#374151}.ambiente-row td{background:#dff1fb!important;color:#0d5d8c;font-weight:950;text-transform:uppercase;letter-spacing:.04em}.empty{padding:20px;border-radius:16px;background:#fff;border:1px dashed rgba(16,121,186,.22);color:var(--cg-muted);font-weight:900;text-align:center}.error{background:#fff0f0;border:1px solid rgba(220,38,38,.25);color:#991b1b;padding:14px;border-radius:14px;font-weight:900;margin-bottom:14px}
.document-actions{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:14px;position:relative}.action-group{border:1px solid rgba(16,121,186,.14);background:linear-gradient(180deg,#fff,#f7fbff);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:10px}.action-group-title{font-size:.78rem;font-weight:950;color:var(--cg-blue-dark);text-transform:uppercase;letter-spacing:.08em}.action-buttons{display:flex;gap:10px;flex-wrap:wrap}.action-buttons .btn{flex:1;min-width:180px}.print-document,.thermal-area{display:none}.print-document.active,.thermal-area.active{display:block}.doc-page{width:210mm;min-height:280mm;margin:0 auto;background:#fff;color:#1f2933;padding:14mm;box-sizing:border-box}.doc-header{display:flex;justify-content:space-between;gap:12mm;border-bottom:2px solid #1079ba;padding-bottom:6mm;margin-bottom:6mm}.doc-header h1{font-size:24px;color:#0d5d8c;margin:0}.doc-meta{font-size:12px;line-height:1.55;text-align:right}.doc-section-title{font-size:15px;color:#1079ba;margin:6mm 0 3mm}.doc-table{width:100%;border-collapse:collapse;box-shadow:none;border-radius:0}.doc-table th,.doc-table td{border:1px solid #cfd8df;padding:7px;font-size:11px}.doc-table th{background:#e7f3fb}.doc-ambiente-row td{background:#dff1fb!important;color:#0d5d8c;font-weight:900;text-transform:uppercase;letter-spacing:.04em}.doc-total{text-align:right;font-size:18px;font-weight:900;margin-top:6mm}.op-page{width:210mm;min-height:280mm;margin:0 auto;background:#fff;color:#1f2933;padding:10mm;box-sizing:border-box;page-break-after:always}.op-header{border-bottom:2px solid #1079ba;padding-bottom:4mm;margin-bottom:5mm}.op-header h2{font-size:22px;color:#0d5d8c;margin:0 0 2mm}.op-content{display:grid;grid-template-columns:2fr 1fr;gap:12mm;align-items:center}.op-info-row{display:grid;grid-template-columns:38mm 1fr;gap:3mm;margin-bottom:3mm;font-size:13px}.op-info-row span{font-weight:900}.op-svg{width:100%;height:auto;border:1px solid #d4d9df}.op-measure{font-size:18px;fill:#333}.thermal-label{width:100mm;height:150mm;padding:6mm;border:1px solid #333;box-sizing:border-box;background:#fff;color:#111;font-size:18px;display:flex;flex-direction:column;justify-content:space-between;gap:6px;page-break-after:always}.thermal-divider{border-top:1px solid #333;margin:4px 0}.thermal-header,.thermal-body,.thermal-footer{font-size:18px;line-height:1.35}.thermal-body strong{font-size:20px}
@media print{@page{size:A4 portrait;margin:0}body{background:#fff}.app{display:none!important}.print-document.active,.thermal-area.active{display:block!important}.print-document:not(.active),.thermal-area:not(.active){display:none!important}.doc-page,.op-page{box-shadow:none;margin:0 auto}.btn{display:none!important}}
@media(max-width:980px){.app{grid-template-columns:1fr}.sidebar{height:auto;position:relative;top:0;flex-direction:row;flex-wrap:wrap}.sidebar button{text-align:center;flex:1}.grid{grid-template-columns:1fr}.info-list,.document-actions{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar"><h3>COLOR GLASS</h3><button onclick="voltarOrcamentos()">Voltar para orçamentos</button></aside>
  <main class="content">
    <div class="header"><div><h1>Informações do orçamento</h1><div class="subtitle" id="subtitulo">Carregando dados do orçamento...</div></div><div class="status-pill" id="statusPedido">Status</div></div>
    <div id="erroBox"></div>
    <section class="grid"><div class="card"><div class="kpi-label">Pedido</div><div class="kpi-value" id="kpiPedido">-</div></div><div class="card"><div class="kpi-label">Cliente</div><div class="kpi-value" id="kpiCliente">-</div></div><div class="card"><div class="kpi-label">Quantidade total</div><div class="kpi-value" id="kpiQtd">-</div></div><div class="card"><div class="kpi-label">Valor total</div><div class="kpi-value" id="kpiValor">-</div></div></section>
    <section class="card"><h2>Dados gerais</h2><div class="info-list" id="dadosGerais"></div></section>
    <section class="card" style="margin-top:18px;"><h2>Documentos e produção</h2><div class="document-actions"><div class="action-group"><div class="action-group-title">Documentos</div><div class="action-buttons"><button class="btn" onclick="imprimirOrcamentoCliente()">Orçamento do cliente</button><button class="btn" onclick="imprimirOrdemProducaoViz()">Ordem de produção</button></div></div><div class="action-group"><div class="action-group-title">Produção</div><div class="action-buttons"><button class="btn" onclick="imprimirEtiquetasViz()">Etiquetas térmicas</button></div></div></div></section>
    <section class="card" style="margin-top:18px;"><h2>Portas / itens do orçamento</h2><div id="portasBox" class="table-wrap"><div class="empty">Carregando itens...</div></div></section>
  </main>
</div>
<div id="printOrcamentoCliente" class="print-document"></div>
<div id="printOrdemViz" class="print-document"></div>
<div id="printEtiquetaViz" class="thermal-area"></div>
<script>
const BACKEND_URL="https://colorglass.onrender.com";
const params=new URLSearchParams(window.location.search);
const ORCAMENTO_UUID=params.get('orcamento_uuid');
let PERFIS=[];let VIDROS=[];let SISTEMAS=[];let LOJAS=[];let ORCAMENTO_ATUAL=null;let PORTAS_ATUAIS=[];
function tokenAtual(){return localStorage.getItem('USER_TOKEN')||params.get('token')||''}
function tokenParam(prefix='&'){const token=tokenAtual();return token?`${prefix}token=${encodeURIComponent(token)}`:''}
function authHeaders(){const token=tokenAtual();return token?{Authorization:`Bearer ${token}`}:{}}
function moeda(v){const n=Number(v);return Number.isFinite(n)?`R$ ${n.toFixed(2)}`:'-'}
function texto(v){return(v===null||v===undefined||v==='')?'-':String(v)}
function dataLocal(v){if(!v)return'-';const d=new Date(v);return Number.isNaN(d.getTime())?'-':d.toLocaleString('pt-BR')}
function dataHoje(){return new Date().toLocaleDateString('pt-BR')}
function escapeHtml(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function voltarOrcamentos(){window.location.href='index_loja.html'+tokenParam('?')}
function renderInfoItem(label,value){return`<div class="info-item"><b>${escapeHtml(label)}</b><span>${escapeHtml(texto(value))}</span></div>`}
function lojaIdOrcamento(o){return o?.lojaid??o?.lojaID??o?.storeID??o?.storeid??o?.loja_id??o?.store_id??''}
function nomeLoja(o){const direto=o?.loja_nome??o?.nome_loja??o?.loja??o?.store_name??o?.nomeLoja;if(direto&&String(direto).trim()&&!/^\d+$/.test(String(direto)))return direto;const id=lojaIdOrcamento(o);const loja=LOJAS.find(l=>String(l.id)===String(id)||String(l.lojaid)===String(id)||String(l.storeid)===String(id)||String(l.storeID)===String(id));return loja?.nome??loja?.name??loja?.loja_nome??loja?.razao_social??'Loja não identificada'}
function renderOrcamento(o){ORCAMENTO_ATUAL=o;const numero=o?.numero_pedido??o?.numero??'-';const cliente=o?.cliente_nome??o?.nome_cliente??o?.cliente??'-';const status=o?.status_label??o?.status??'-';document.getElementById('subtitulo').textContent=`${cliente} · Pedido #${numero}`;document.getElementById('statusPedido').textContent=`Status: ${status}`;document.getElementById('kpiPedido').textContent=`#${numero}`;document.getElementById('kpiCliente').textContent=cliente;document.getElementById('dadosGerais').innerHTML=[renderInfoItem('Número do pedido',numero),renderInfoItem('Cliente',cliente),renderInfoItem('Cidade',o?.cliente_cidade??o?.cidade),renderInfoItem('Loja',nomeLoja(o)),renderInfoItem('Status',status),renderInfoItem('Quantidade total',o?.quantidade_total),renderInfoItem('Valor total',moeda(o?.valor_total)),renderInfoItem('Data de criação',dataLocal(o?.data_criacao??o?.created_at)),renderInfoItem('Última atualização',dataLocal(o?.updated_at??o?.data_atualizacao))].join('')}
function parseDados(p){let d=p?.dados??p?.data??p?.json??p?.detalhes??{};if(Array.isArray(d)){const obj={};d.forEach(item=>{if(typeof item!=='string'||!item.includes(':'))return;const idx=item.indexOf(':');const key=item.slice(0,idx).trim();const value=item.slice(idx+1).trim();if(key)obj[key]=value});d=obj}else if(typeof d==='string'){try{d=JSON.parse(d)}catch(_){d={}}}return(d&&typeof d==='object')?d:{}}
function campo(p,nomes){const d=parseDados(p);for(const nome of nomes){if(p&&p[nome]!==undefined&&p[nome]!==null&&p[nome]!=='')return p[nome];if(d&&d[nome]!==undefined&&d[nome]!==null&&d[nome]!=='')return d[nome]}return''}
function nomePorId(lista,id,campos=['nome','tipo','descricao']){if(id===undefined||id===null||id==='')return'';const item=lista.find(x=>String(x.id)===String(id));if(!item)return String(id);for(const c of campos){if(item[c])return item[c]}return String(id)}
function normalizarPortas(data){if(Array.isArray(data))return data;if(Array.isArray(data?.portas))return data.portas;if(Array.isArray(data?.items))return data.items;if(Array.isArray(data?.data))return data.data;if(Array.isArray(data?.rows))return data.rows;return[]}
function ambientePorta(p){return campo(p,['ambiente','ambiente_nome','ambienteNome','local','comodo','cômodo'])||'Sem ambiente informado'}
function portaView(p){const tipo=campo(p,['tipo','tipologia','classe'])||'-';const largura=campo(p,['largura','width'])||'-';const altura=campo(p,['altura','height'])||'-';const qtd=Number(campo(p,['quantidade','qtd'])||1);const perfilId=campo(p,['perfil','perfil_id','perfilId']);const vidroId=campo(p,['vidro','vidro_id','vidroId']);const sistemaId=campo(p,['sistemas','sistema','sistema_id','sistemaId']);const puxadorId=campo(p,['puxador','puxador_id','puxadorId']);const perfil=nomePorId(PERFIS,perfilId,['nome','tipo','descricao'])||'-';const vidro=nomePorId(VIDROS,vidroId,['tipo','nome','descricao'])||'-';const sistema=sistemaId?nomePorId(SISTEMAS,sistemaId,['nome','tipo','descricao']):'';const valor=Number(campo(p,['preco','preco_total','valor_total','valor'])||0);return{ambiente:ambientePorta(p),tipo,largura,altura,qtd:Number.isFinite(qtd)?qtd:1,perfil,vidro,sistema,puxador:puxadorId||campo(p,['puxador_nome'])||'-',valor,obsProducao:campo(p,['observacao_producao','obs_producao'])||'-',obsVenda:campo(p,['observacao_venda','obs_venda'])||'-',dobradicas:campo(p,['dobradicas'])||'-',dobradicasAlturas:campo(p,['dobradicas_alturas'])||'-'}}
function gruposPorAmbiente(portas){const grupos=[];const mapa=new Map();(Array.isArray(portas)?portas:[]).forEach((porta,index)=>{const view=portaView(porta);const ambiente=view.ambiente||'Sem ambiente informado';if(!mapa.has(ambiente)){const grupo={ambiente,itens:[]};mapa.set(ambiente,grupo);grupos.push(grupo)}mapa.get(ambiente).itens.push({porta,index,view})});return grupos}
function renderPortas(portas){PORTAS_ATUAIS=Array.isArray(portas)?portas:[];const box=document.getElementById('portasBox');if(!PORTAS_ATUAIS.length){box.innerHTML='<div class="empty">Nenhuma porta/item salvo neste orçamento.</div>';document.getElementById('kpiQtd').textContent='0';document.getElementById('kpiValor').textContent='R$ 0.00';return}let qtdTotal=0;let valorTotal=0;const rows=gruposPorAmbiente(PORTAS_ATUAIS).map(grupo=>`<tr class="ambiente-row"><td colspan="8">Ambiente: ${escapeHtml(grupo.ambiente)}</td></tr>${grupo.itens.map(({index,view:v})=>{qtdTotal+=v.qtd;valorTotal+=v.valor;return`<tr><td>${index+1}</td><td>${escapeHtml(v.ambiente)}</td><td>${escapeHtml(v.tipo)}</td><td>${escapeHtml(v.largura)} × ${escapeHtml(v.altura)}</td><td>${escapeHtml(v.qtd)}</td><td>${escapeHtml(v.vidro)}</td><td>${escapeHtml(v.sistema?`${v.perfil} / ${v.sistema}`:v.perfil)}</td><td>${moeda(v.valor)}</td></tr>`}).join('')}`).join('');box.innerHTML=`<table><thead><tr><th>#</th><th>Ambiente</th><th>Tipologia</th><th>Dimensões</th><th>Qtd.</th><th>Vidro</th><th>Perfil / sistema</th><th>Valor</th></tr></thead><tbody>${rows}</tbody></table>`;document.getElementById('kpiQtd').textContent=String(qtdTotal);document.getElementById('kpiValor').textContent=moeda(valorTotal)}
async function getJson(url,headers={}){const res=await fetch(url,{headers});return await res.json()}
function normalizarLojas(data){if(Array.isArray(data))return data;if(Array.isArray(data?.lojas))return data.lojas;if(Array.isArray(data?.stores))return data.stores;if(Array.isArray(data?.data))return data.data;return[]}
function resumoOrcamento(){const o=ORCAMENTO_ATUAL||{};return{numero:o?.numero_pedido??o?.numero??'-',cliente:o?.cliente_nome??o?.nome_cliente??o?.cliente??'-',cidade:o?.cliente_cidade??o?.cidade??'-',loja:nomeLoja(o),status:o?.status_label??o?.status??'-'}}
function totalPortas(){return PORTAS_ATUAIS.reduce((s,p)=>s+(portaView(p).valor||0),0)}
function limparPrint(){['printOrcamentoCliente','printOrdemViz','printEtiquetaViz'].forEach(id=>document.getElementById(id)?.classList.remove('active'))}
function tabelaItensDoc(){const grupos=gruposPorAmbiente(PORTAS_ATUAIS);const linhas=grupos.map(grupo=>`<tr class="doc-ambiente-row"><td colspan="7">Ambiente: ${escapeHtml(grupo.ambiente)}</td></tr>${grupo.itens.map(({index,view:v})=>`<tr><td>${index+1}</td><td>Porta ${escapeHtml(v.tipo)}</td><td>${escapeHtml(v.largura)} × ${escapeHtml(v.altura)} mm</td><td>${v.qtd}</td><td>${escapeHtml(v.perfil)}</td><td>${escapeHtml(v.vidro)}</td><td>${moeda(v.valor)}</td></tr>`).join('')}`).join('');return`<table class="doc-table"><thead><tr><th>#</th><th>Produto</th><th>Medidas</th><th>Qtd.</th><th>Acabamento / Perfil</th><th>Vidro</th><th>Valor</th></tr></thead><tbody>${linhas}</tbody></table>`}
function imprimirOrcamentoCliente(){if(!PORTAS_ATUAIS.length){alert('Nenhum item para imprimir.');return}const r=resumoOrcamento();const html=`<div class="doc-page"><div class="doc-header"><div><h1>Orçamento ColorGlass</h1><p>Portas de alumínio e vidro sob medida</p></div><div class="doc-meta"><strong>Pedido:</strong> ${escapeHtml(r.numero)}<br><strong>Data:</strong> ${dataHoje()}<br><strong>Loja:</strong> ${escapeHtml(r.loja)}</div></div><div><strong>Cliente:</strong> ${escapeHtml(r.cliente)}<br><strong>Cidade:</strong> ${escapeHtml(r.cidade)}</div><h2 class="doc-section-title">Itens do orçamento por ambiente</h2>${tabelaItensDoc()}<div class="doc-total">Total geral: ${moeda(totalPortas())}</div></div>`;limparPrint();const c=document.getElementById('printOrcamentoCliente');c.innerHTML=html;c.classList.add('active');window.print()}
function svgOrdem(v){const largura=parseFloat(v.largura||0),altura=parseFloat(v.altura||0);if(!largura||!altura)return'';const cw=420,ch=560,pad=60,aw=cw-pad*2,ah=ch-pad*2,scale=Math.min(aw/largura,ah/altura),dw=largura*scale,dh=altura*scale,dx=pad+(aw-dw)/2,dy=pad+(ah-dh)/2;return`<svg class="op-svg" width="${cw}" height="${ch}" viewBox="0 0 ${cw} ${ch}" xmlns="http://www.w3.org/2000/svg"><rect x="${dx}" y="${dy}" width="${dw}" height="${dh}" fill="#f4f8ff" stroke="#1079ba" stroke-width="3"/><text x="${dx+dw/2}" y="${dy+dh/2}" text-anchor="middle" dominant-baseline="middle" font-size="28" font-weight="800">${v.qtd}x</text><line x1="${dx-16}" y1="${dy}" x2="${dx-16}" y2="${dy+dh}" stroke="#333"/><text x="${dx-40}" y="${dy+dh/2}" class="op-measure" text-anchor="middle" dominant-baseline="middle" transform="rotate(-90 ${dx-40} ${dy+dh/2})">${altura} mm</text><line x1="${dx}" y1="${dy+dh+20}" x2="${dx+dw}" y2="${dy+dh+20}" stroke="#333"/><text x="${dx+dw/2}" y="${dy+dh+44}" class="op-measure" text-anchor="middle">${largura} mm</text></svg>`}
function imprimirOrdemProducaoViz(){if(!PORTAS_ATUAIS.length){alert('Nenhum item para imprimir.');return}const r=resumoOrcamento();const statusNum=Number(ORCAMENTO_ATUAL?.status);if(Number.isFinite(statusNum)&&statusNum<2){alert('A Ordem de Produção só deve ser impressa após aprovação do pedido.');return}const pages=PORTAS_ATUAIS.map((p,i)=>{const v=portaView(p);return`<div class="op-page"><div class="op-header"><h2>Ordem de Produção</h2><p>Cliente: ${escapeHtml(r.cliente)} | Pedido: ${escapeHtml(r.numero)}</p></div><div class="op-content"><div>${svgOrdem(v)}</div><div><div class="op-info-row"><span>Item</span><strong>${i+1}</strong></div><div class="op-info-row"><span>Ambiente</span><strong>${escapeHtml(v.ambiente)}</strong></div><div class="op-info-row"><span>Quantidade</span><strong>${v.qtd}</strong></div><div class="op-info-row"><span>Medida</span><strong>${escapeHtml(v.largura)} × ${escapeHtml(v.altura)} mm</strong></div><div class="op-info-row"><span>Tipologia</span><strong>${escapeHtml(v.tipo)}</strong></div><div class="op-info-row"><span>Perfil</span><strong>${escapeHtml(v.perfil)}</strong></div><div class="op-info-row"><span>Vidro</span><strong>${escapeHtml(v.vidro)}</strong></div><div class="op-info-row"><span>Sistema</span><strong>${escapeHtml(v.sistema||'-')}</strong></div><div class="op-info-row"><span>Puxador</span><strong>${escapeHtml(v.puxador)}</strong></div><div class="op-info-row"><span>Dobradiças</span><strong>${escapeHtml(v.dobradicas)}</strong></div><div class="op-info-row"><span>Alturas dobradiças</span><strong>${escapeHtml(v.dobradicasAlturas)}</strong></div><div class="op-info-row"><span>Obs. produção</span><strong>${escapeHtml(v.obsProducao)}</strong></div><div class="op-info-row"><span>Obs. comercial</span><strong>${escapeHtml(v.obsVenda)}</strong></div></div></div></div>`}).join('');limparPrint();const c=document.getElementById('printOrdemViz');c.innerHTML=pages;c.classList.add('active');window.print()}
function imprimirEtiquetasViz(){if(!PORTAS_ATUAIS.length){alert('Nenhum item para imprimir.');return}const r=resumoOrcamento();let etiquetas='';PORTAS_ATUAIS.forEach((p,i)=>{const v=portaView(p);for(let n=1;n<=v.qtd;n++){etiquetas+=`<div class="thermal-label"><div class="thermal-header"><div><strong>Pedido:</strong> ${escapeHtml(r.numero)}</div><div><strong>Data:</strong> ${dataHoje()}</div><div><strong>Item:</strong> ${i+1}</div><div><strong>Peça:</strong> ${n}/${v.qtd}</div><div><strong>Cliente:</strong> ${escapeHtml(r.cliente)}</div><div><strong>Cidade:</strong> ${escapeHtml(r.cidade)}</div><div><strong>Ambiente:</strong> ${escapeHtml(v.ambiente)}</div></div><div class="thermal-divider"></div><div class="thermal-body"><div><strong>${escapeHtml(v.tipo)} - ${escapeHtml(v.largura)} × ${escapeHtml(v.altura)} mm</strong></div><div>${escapeHtml(v.perfil)}</div><div>${escapeHtml(v.vidro)}</div></div><div class="thermal-divider"></div><div class="thermal-footer">colorglassfortaleza.com.br</div></div>`}});limparPrint();const c=document.getElementById('printEtiquetaViz');c.innerHTML=etiquetas;c.classList.add('active');window.print()}
async function carregar(){const erroBox=document.getElementById('erroBox');if(!ORCAMENTO_UUID){erroBox.innerHTML='<div class="error">UUID do orçamento não informado.</div>';return}try{const headers=authHeaders();const[orcamentosData,portasData,perfisData,vidrosData,sistemasData,lojasData]=await Promise.all([getJson(`${BACKEND_URL}/api/orcamentos`,headers),getJson(`${BACKEND_URL}/api/orcamento/${encodeURIComponent(ORCAMENTO_UUID)}/portas`,headers),getJson(`${BACKEND_URL}/api/perfis`).catch(()=>[]),getJson(`${BACKEND_URL}/api/vidros`).catch(()=>[]),getJson(`${BACKEND_URL}/api/sistemas`).catch(()=>[]),getJson(`${BACKEND_URL}/api/lojas`,headers).catch(()=>[])]);PERFIS=Array.isArray(perfisData)?perfisData:[];VIDROS=Array.isArray(vidrosData)?vidrosData:[];SISTEMAS=Array.isArray(sistemasData)?sistemasData:[];LOJAS=normalizarLojas(lojasData);const lista=Array.isArray(orcamentosData?.orcamentos)?orcamentosData.orcamentos:[];const orcamento=lista.find(item=>String(item.id)===String(ORCAMENTO_UUID));if(!orcamento){erroBox.innerHTML='<div class="error">Orçamento não encontrado na lista de orçamentos.</div>'}else{renderOrcamento(orcamento)}renderPortas(normalizarPortas(portasData))}catch(err){console.error(err);erroBox.innerHTML='<div class="error">Erro ao carregar informações do orçamento.</div>';renderPortas([])}}
carregar();
</script>
