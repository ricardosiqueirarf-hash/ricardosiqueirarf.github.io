<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ColorGlass</title>
<link rel="icon" href="/favicon.ico?v=4" sizes="any">
<link rel="shortcut icon" href="/favicon.ico?v=4">
<link rel="icon" type="image/png" sizes="512x512" href="https://hfhwvzldhgqniqnurync.supabase.co/storage/v1/object/public/teste/logo-512.png?v=4">
<link rel="apple-touch-icon" sizes="180x180" href="https://hfhwvzldhgqniqnurync.supabase.co/storage/v1/object/public/teste/logo-512.png?v=4">
<meta name="theme-color" content="#1079ba">
<meta name="description" content="Login de usuários ColorGlass.">
<script src="global.js"></script>
<style>
:root{--cg-blue:#1079ba;--cg-blue-dark:#0d5d8c;--cg-blue-soft:#e7f3fb;--cg-gold:#f0c24c;--cg-white:#fff;--cg-text:#1f2933}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif}
body{background:radial-gradient(circle at top,rgba(16,121,186,.15),transparent 55%),linear-gradient(135deg,#f5fbff 0%,#eef4f9 45%,#f8fbff 100%);color:var(--cg-text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px}
.page{width:min(1100px,100%);display:flex;flex-direction:column;gap:24px;animation:fadeIn .9s ease}
.brand{display:flex;align-items:center;gap:16px;padding:20px 24px;background:var(--cg-white);border-radius:18px;box-shadow:0 10px 30px rgba(15,44,62,.12);position:relative;overflow:hidden;max-width:780px;width:100%;margin:0 auto}
.brand::after{content:"";position:absolute;right:-80px;top:-120px;width:240px;height:240px;background:radial-gradient(circle,rgba(16,121,186,.25),transparent 60%)}
.logo-mark{width:52px;height:52px;border-radius:14px;background:var(--cg-white);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 8px 18px rgba(16,121,186,.35)}
.logo-mark img{width:100%;height:100%;object-fit:contain;display:block}
.brand h1{font-size:1.6rem;color:var(--cg-blue-dark)}
.brand span{color:var(--cg-blue);font-weight:600}
.brand p{margin-top:4px;color:#4b5563;font-size:.95rem}
.container{width:100%;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;max-width:520px;margin:0 auto}
.card{background:var(--cg-white);border-radius:18px;padding:28px;box-shadow:0 12px 30px rgba(15,44,62,.12);border:1px solid rgba(16,121,186,.08);position:relative;overflow:hidden;animation:floatIn .8s ease}
.card::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(16,121,186,.08),transparent 55%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.card:hover::before{opacity:1}
.card h2{color:var(--cg-blue);margin-bottom:12px;font-size:1.3rem}
label{font-size:.95rem;display:flex;flex-direction:column;gap:6px;margin-bottom:12px;color:#374151}
input{padding:12px 14px;border-radius:10px;border:1px solid #d4d9df;font-size:.95rem;transition:border .2s ease,box-shadow .2s ease;background:#fdfefe;width:100%}
input:focus{outline:none;border-color:var(--cg-blue);box-shadow:0 0 0 3px rgba(16,121,186,.15)}
.btn{background:linear-gradient(135deg,var(--cg-blue),var(--cg-blue-dark));color:#fff;border:none;border-radius:12px;padding:12px;font-weight:600;cursor:pointer;width:100%;transition:transform .2s ease,box-shadow .2s ease,opacity .2s ease;box-shadow:0 8px 16px rgba(16,121,186,.25)}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 22px rgba(16,121,186,.28)}
.btn:active:not(:disabled){transform:translateY(0)}
.btn:disabled{opacity:.65;cursor:not-allowed;transform:none}
.status{margin-top:10px;font-size:.9rem;color:#555;min-height:20px}.status.ok{color:#0c7c3c}.status.erro{color:#c23616}
.hint{font-size:.85rem;color:#6b7280;line-height:1.4;margin-top:8px}.hint a{color:var(--cg-blue);font-weight:600;text-decoration:none}.hint a:hover{text-decoration:underline}
.pill{display:inline-flex;align-items:center;gap:8px;background:var(--cg-blue-soft);color:var(--cg-blue-dark);padding:6px 12px;border-radius:999px;font-size:.85rem;margin-bottom:16px}.pill span{display:inline-block;width:8px;height:8px;border-radius:999px;background:var(--cg-gold);box-shadow:0 0 8px rgba(240,194,76,.6)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:680px){.brand{flex-direction:column;align-items:flex-start}.brand h1{font-size:1.4rem}}
</style>
</head>
<body>
<div class="page">
  <header class="brand">
    <div class="logo-mark"><img src="https://hfhwvzldhgqniqnurync.supabase.co/storage/v1/object/public/teste/logo.jpg" alt="Logo ColorGlass"></div>
    <div><h1>ColorGlass <span>Portal de Acesso</span></h1><p>Bem-vindo(a) ao ambiente oficial da ColorGlass. Gerencie seus orçamentos com segurança.</p></div>
  </header>
  <div class="container">
    <div class="card">
      <div class="pill"><span></span>Já possui acesso?</div>
      <h2>Login</h2>
      <label>Usuário
        <input type="text" id="loginUser" placeholder="Digite seu usuário" autocomplete="username">
      </label>
      <label>Senha
        <input type="password" id="loginPass" placeholder="Digite sua senha" autocomplete="current-password">
      </label>
      <button class="btn" type="button" id="loginBtn" onclick="logar()">Entrar</button>
      <div id="loginStatus" class="status" aria-live="polite"></div>
      <p class="hint">Ainda não tem conta? <a href="cadastro.html">Crie seu cadastro</a>.</p>
    </div>
  </div>
</div>
<script>
const API_BASE="https://colorglass.onrender.com";
let loginEmAndamento=false;
function setStatus(elementId,message,tipo){const el=document.getElementById(elementId);if(!el)return;el.textContent=message||"";el.classList.remove("ok","erro");if(tipo)el.classList.add(tipo)}
function setLoginLoading(loading){const btn=document.getElementById("loginBtn");if(!btn)return;btn.disabled=loading;btn.textContent=loading?"Verificando...":"Entrar"}
async function lerJsonSeguro(res){try{return await res.json()}catch(err){return {}}}
function mensagemLoginFalhou(status,data){if(status===429)return data.error||"Muitas tentativas. Aguarde alguns minutos e tente novamente.";if(status===403&&data&&data.error)return data.error;return "Usuário, senha ou acesso inválido."}
function destinoPorNivel(level,redirect){const n=Number(level);if(n===3)return "index_admin.html";if(n===4)return "/index_logistica.html";return redirect||"index_loja.html"}
async function logar(){if(loginEmAndamento)return;const user=document.getElementById("loginUser").value.trim();const pass=document.getElementById("loginPass").value;if(!user||!pass){setStatus("loginStatus","Preencha usuário e senha.","erro");return}loginEmAndamento=true;setLoginLoading(true);let redirecionando=false;try{setStatus("loginStatus","Verificando...");const res=await fetch(`${API_BASE}/api/usuarios/login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user,pass})});const data=await lerJsonSeguro(res);if(!res.ok||!data.success||!data.token){setStatus("loginStatus",mensagemLoginFalhou(res.status,data),"erro");return}localStorage.setItem("USER_TOKEN",data.token);localStorage.setItem("ADMIN_TOKEN",data.token);setStatus("loginStatus","Login autorizado. Validando permissões...","ok");const resAuth=await fetch(`${API_BASE}/api/auth/validar`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${data.token}`}});const dataAuth=await lerJsonSeguro(resAuth);if(!resAuth.ok||!dataAuth.success){setStatus("loginStatus","Sessão inválida. Faça login novamente.","erro");return}localStorage.setItem("USER_LEVEL",String(dataAuth.level??""));if(dataAuth.storeid)localStorage.setItem("USER_STOREID",dataAuth.storeid);const destino=destinoPorNivel(dataAuth.level,dataAuth.redirect);setStatus("loginStatus","Acesso validado. Redirecionando...","ok");redirecionando=true;setTimeout(()=>{window.location.href=destino},400)}catch(err){console.error(err);setStatus("loginStatus","Erro inesperado. Contate o suporte.","erro")}finally{if(!redirecionando){loginEmAndamento=false;setLoginLoading(false)}}}
window.logar=logar;
document.addEventListener("DOMContentLoaded",()=>{const userInput=document.getElementById("loginUser");const passInput=document.getElementById("loginPass");if(passInput)passInput.type="password";if(userInput)userInput.focus();[userInput,passInput].forEach(input=>{if(!input)return;input.addEventListener("keydown",event=>{if(event.key==="Enter"){event.preventDefault();logar()}})})});
</script>
</body>
</html>
