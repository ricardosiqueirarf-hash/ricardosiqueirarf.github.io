<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamentos | ColorGlass</title>
<!-- =====================
     FAVICON DEFINITIVO
     ===================== -->

<!-- Principal (Render - raiz do site) -->

<style>
/* =====================
   ESTÉTICA NOVA (login/aprovacao-like)
   ⚠️ MECÂNICA INTACTA
   ===================== */

:root{
  --cg-blue:#1079ba;
  --cg-blue-dark:#0d5d8c;
  --cg-blue-soft:#e7f3fb;
  --cg-gold:#f0c24c;
  --cg-white:#ffffff;
  --cg-text:#1f2933;
  --cg-muted:#6b7280;
  --cg-border:rgba(16,121,186,0.12);
  --cg-shadow: 0 12px 30px rgba(15, 44, 62, 0.12);
  --cg-shadow-soft: 0 10px 24px rgba(15,44,62,0.10);
}

/* RESET BÁSICO */
* { box-sizing: border-box; margin:0; padding:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

/* FUNDO igual vibe do aprovacao/login */
body{
  min-height: 100vh;
  display: flex;
  background:
    radial-gradient(circle at top, rgba(16,121,186,0.16), transparent 55%),
    linear-gradient(135deg, #f5fbff 0%, #eef4f9 45%, #f8fbff 100%);
  color: var(--cg-text);
}

/* APP WRAPPER */
.app {
  display: flex;
  width: 100%;
  gap: 18px;
  padding: 18px;
  animation: fadeIn 0.7s ease;
}

/* SIDEBAR — ainda azul, mas mais “card” como login */
.sidebar{
  width: 240px;
  background: linear-gradient(135deg, var(--cg-blue), var(--cg-blue-dark));
  color: #fff;
  display: flex;
  flex-direction: column;
  padding: 22px 18px;
  gap: 12px;
  border-radius: 18px;
  box-shadow: var(--cg-shadow);
  position: sticky;
  top: 18px;
  height: calc(100vh - 36px);
  overflow: hidden;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.sidebar::after{
  content:"";
  position:absolute;
  right:-90px;
  top:-120px;
  width: 260px;
  height: 260px;
  background: radial-gradient(circle, rgba(255,255,255,0.22), transparent 60%);
  pointer-events:none;
}

.sidebar:hover{
  transform: translateY(-2px);
  box-shadow: 0 16px 36px rgba(15,44,62,0.16);
}

.sidebar h3{
  font-size: 1.25rem;
  margin-bottom: 6px;
  letter-spacing: 0.8px;
  transition: transform .25s ease, opacity .25s ease;
  position: relative;
  z-index: 1;
}

.sidebar h3:hover{
  transform: translateY(-1px);
  opacity: 0.95;
}

/* BOTÕES SIDEBAR */
.sidebar button{
  background: rgba(255,255,255,0.14);
  padding: 12px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.18);
  cursor: pointer;
  text-align: left;
  font-weight: 600;
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
  color: #fff;
  position: relative;
  z-index: 1;
}

.sidebar button:hover{
  background: rgba(255,255,255,0.22);
  transform: translateX(4px);
  box-shadow: 0 10px 18px rgba(0,0,0,0.14);
}

/* CONTENT como “cards” */
.content{
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  border-radius: 18px;
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(16,121,186,0.10);
  box-shadow: var(--cg-shadow-soft);
  backdrop-filter: blur(10px);
  animation: floatIn 0.6s ease;
}

/* Títulos */
.content h1{
  color: var(--cg-blue-dark);
  font-size: 1.6rem;
  margin-bottom: 14px;
}

.content h2{
  margin-top: 10px;
  color: var(--cg-blue);
  font-size: 1.15rem;
}

/* FORMULÁRIOS — card estilo aprovacao */
#formCliente{
  background: var(--cg-white);
  padding: 20px;
  border-radius: 18px;
  margin: 14px 0 22px;
  box-shadow: var(--cg-shadow-soft);
  border: 1px solid var(--cg-border);
  position: relative;
  overflow: hidden;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

#formCliente::before{
  content:"";
  position:absolute;
  inset:0;
  background: linear-gradient(120deg, rgba(16,121,186,0.10), transparent 55%);
  opacity: 0;
  transition: opacity 0.25s ease;
  pointer-events:none;
}
#formCliente:hover{
  transform: translateY(-2px);
  box-shadow: 0 14px 34px rgba(15,44,62,0.14);
}
#formCliente:hover::before{ opacity: 1; }

#formCliente label{
  font-size: 0.95rem;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  color: #374151;
}

#formCliente input,
#formCliente select{
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid #d4d9df;
  margin-top: 0;
  background: #fdfefe;
  transition: border 0.2s ease, box-shadow 0.2s ease;
}

#formCliente input:focus,
#formCliente select:focus{
  border-color: var(--cg-blue);
  box-shadow: 0 0 0 3px rgba(16,121,186,0.15);
  outline: none;
}

/* BOTÕES — gradiente igual aprovacao */
.btn{
  padding: 12px 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--cg-blue), var(--cg-blue-dark));
  color: #fff;
  font-weight: 800;
  margin-top: 10px;
  transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
  box-shadow: 0 10px 18px rgba(16,121,186,0.22);
}

.btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 14px 24px rgba(16,121,186,0.26);
}

.btn:active{ transform: translateY(0); }

/* TOOLBAR — estilo input “clean” */
.orcamentos-toolbar{
  display: flex;
  gap: 12px;
  align-items: center;
  margin: 12px 0 12px;
  flex-wrap: wrap;
}

.orcamentos-toolbar input{
  flex: 1;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid #d4d9df;
  background: #fff;
  transition: border .2s ease, box-shadow .2s ease, transform .2s ease;
}

.orcamentos-toolbar input:focus{
  border-color: var(--cg-blue);
  box-shadow: 0 0 0 3px rgba(16,121,186,0.15);
  outline: none;
}

.orcamentos-toolbar input:hover{
  transform: translateY(-1px);
}

.status-text{
  font-size: 0.9rem;
  color: var(--cg-muted);
  background: rgba(231,243,251,0.65);
  border: 1px solid rgba(16,121,186,0.14);
  padding: 8px 10px;
  border-radius: 999px;
  white-space: nowrap;
}

.orcamentos-limit{
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.limit-label{
  font-size: 0.9rem;
  color: var(--cg-muted);
  white-space: nowrap;
}

.limit-buttons{
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.limit-btn{
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid rgba(16,121,186,0.2);
  background: #fff;
  color: var(--cg-blue-dark);
  font-weight: 700;
  cursor: pointer;
  transition: transform .2s ease, box-shadow .2s ease, background .2s ease, color .2s ease, border-color .2s ease;
}

.limit-btn:hover{
  transform: translateY(-1px);
  box-shadow: 0 8px 16px rgba(16,121,186,0.18);
}

.limit-btn.active{
  background: linear-gradient(135deg, var(--cg-blue), var(--cg-blue-dark));
  color: #fff;
  border-color: rgba(16,121,186,0.45);
  box-shadow: 0 10px 18px rgba(16,121,186,0.24);
}

/* AÇÕES com ícones — mais “premium” */
.actions{
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: flex-start;
}

.icon-btn{
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: 1px solid rgba(16,121,186,0.18);
  background: rgba(255,255,255,0.85);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color .18s ease;
  box-shadow: 0 10px 18px rgba(15,44,62,0.10);
  user-select: none;
  padding: 0;
}

.icon-btn:hover{
  transform: translateY(-2px);
  background: #ffffff;
  border-color: rgba(16,121,186,0.28);
  box-shadow: 0 14px 24px rgba(15,44,62,0.14);
}

.icon-btn:active{ transform: translateY(0); }
.icon-btn.edit{ color: var(--cg-blue-dark); }
.icon-btn.pay{ color: #0c7c3c; }

.loja-select{
  min-width: 150px;
  height: 40px;
  border-radius: 12px;
  border: 1px solid rgba(16,121,186,0.18);
  background: rgba(255,255,255,0.85);
  color: var(--cg-blue-dark);
  font-weight: 700;
  padding: 0 10px;
  cursor: pointer;
  box-shadow: 0 10px 18px rgba(15,44,62,0.10);
}

.loja-select:disabled{
  opacity: 0.65;
  cursor: not-allowed;
}

/* TABELAS — card + hover suave */
#orcamentosExistentes { overflow-x: auto; }

table{
  border-collapse: collapse;
  width: 100%;
  margin-top: 14px;
  background: rgba(255,255,255,0.92);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: var(--cg-shadow-soft);
  border: 1px solid rgba(16,121,186,0.10);
}

th, td{
  border: 1px solid rgba(220,221,225,0.85);
  padding: 12px 12px;
  text-align: left;
}

th{
  background: linear-gradient(135deg, rgba(231,243,251,0.95), rgba(231,243,251,0.65));
  color: #1f2933;
  font-weight: 800;
}

tr{
  transition: background .18s ease, transform .18s ease;
}

tr:hover{
  background: rgba(243,249,255,0.95);
}

/* SCROLLBARS CUSTOM */
.content::-webkit-scrollbar { width: 10px; }
.content::-webkit-scrollbar-thumb { background: var(--cg-blue); border-radius: 999px; }
.content::-webkit-scrollbar-track { background: rgba(255,255,255,0.0); }

/* ANIMAÇÕES */
@keyframes fadeIn{
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes floatIn{
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* RESPONSIVO */
@media (max-width: 900px), (orientation: portrait){
  body{ display: block; }
  .app{
    flex-direction: column;
    min-height: 100vh;
    padding: 14px;
  }
  .sidebar{
    width: 100%;
    height: auto;
    position: relative;
    top: 0;
    border-radius: 18px;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .sidebar button{
    text-align: center;
    flex: 1;
  }
  .content{
    padding: 18px 14px 22px;
    border-radius: 18px;
  }
  .orcamentos-toolbar{
    flex-direction: column;
    align-items: stretch;
  }
  .btn{ width: 100%; }
}
</style>
</head>

<body>
<div class="app">
    <div class="sidebar">
        <h3>COLOR GLASS</h3>
        <button onclick="go('index_loja.html')">Orçamentos</button>
        <button onclick="go('controle_loja.html')">Acompanhamento</button>
        <button id="btnCarteira" style="display:none;" onclick="go('gestao-carteira.html')">Carteira</button>
        <button id="btnPagamentos" style="display:none;" onclick="go('pagamentos.html')">Pagamentos</button>
    </div>

    <div class="content">
        <h1>Orçamento de Portas</h1>

        <div id="formCliente">
            <label>Nome do Cliente<input type="text" id="clienteNome"></label>
            <label id="storeSelectorWrap" style="display:none;">
              Loja (Nome)
              <select id="storeSelector"></select>
            </label>
            <button class="btn" onclick="criarFichaCliente()">Criar Ficha</button>
        </div>

        <h2>Orçamentos Existentes</h2>
        <div class="orcamentos-toolbar">
            <input type="text" id="orcamentoFiltro" placeholder="Buscar por cliente ou número do pedido">
            <div class="orcamentos-limit">
              <span class="limit-label">Mostrar:</span>
              <div class="limit-buttons">
                <button class="limit-btn" type="button" data-limit="10">10</button>
                <button class="limit-btn" type="button" data-limit="50">50</button>
                <button class="limit-btn" type="button" data-limit="100">100</button>
                <button class="limit-btn" type="button" data-limit="todos">Todos</button>
              </div>
            </div>
            <span id="orcamentosStatus" class="status-text">Carregando...</span>
        </div>
        <div id="orcamentosExistentes"><em>Carregando...</em></div>
    </div>
</div>
<script>
// =====================
// Navegação
// =====================
function buildUrlComToken(url) {
  const token = getUserToken();
  if (!token) return url;

  try {
    const target = new URL(url, window.location.origin);
    if (!target.searchParams.get("token")) {
      target.searchParams.set("token", token);
    }
    return target.toString();
  } catch (error) {
    console.error("URL inválida:", error);
    return url;
  }
}

function go(url){
  window.location.href = buildUrlComToken(url);
}

// =====================
// URL do backend
// =====================
const BACKEND_URL = "https://colorglass.onrender.com";
let userSession = { level: null, storeid: null };

function getUserToken() {
  return localStorage.getItem("USER_TOKEN");
}

function usuarioPodeSelecionarLoja() {
  return [2, 3].includes(Number(userSession.level));
}

function atualizarBotoesRestritos() {
  const exibirBotaoRestrito = usuarioPodeSelecionarLoja() ? "block" : "none";
  const botaoCarteira = document.getElementById("btnCarteira");
  const botaoPagamentos = document.getElementById("btnPagamentos");

  if (botaoCarteira) {
    botaoCarteira.style.display = exibirBotaoRestrito;
  }

  if (botaoPagamentos) {
    botaoPagamentos.style.display = exibirBotaoRestrito;
  }
}

// =====================
// Sessão
// =====================
async function validarSessao() {
  const USER_TOKEN = getUserToken();

  // redireciona para login se nao tiver user_token
  if (!USER_TOKEN) {
    window.location.href = "login.html";
    return false;
  }

  try {
    const res = await fetch(`${BACKEND_URL}/api/auth/validar`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${USER_TOKEN}`
      }
    });

    // Se backend cair e devolver HTML/erro, evita quebrar
    if (!res.ok) {
      window.location.href = "login.html";
      return false;
    }

    const data = await res.json();

    // se user token estiver errado redireciona pra login
    if (!data.success) {
      window.location.href = "login.html";
      return false;
    }

    // Se backend mandar redirect, obedece (ex: admin vs user)
    if (data.redirect && !window.location.pathname.endsWith(data.redirect)) {
      window.location.href = data.redirect;
      return false;
    }

    userSession = {
      level: data.level ?? null,
      storeid: data.storeid ?? null
    };
        atualizarBotoesRestritos();

    return true;
  } catch (err) {
    console.error("Erro ao validar sessão:", err);
    window.location.href = "login.html";
    return false;
  }
}

// =====================
// CARREGAR ORÇAMENTOS
// =====================
let orcamentosCache = [];
let limiteOrcamentos = 10;
const LIMITE_TODOS = "todos";
let storeSelecionada = null;
let lojasDisponiveis = [];
let lojasPorStoreID = new Map();

function atualizarStatusOrcamentos(mensagem) {
  const status = document.getElementById("orcamentosStatus");
  if (status) status.textContent = mensagem;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatarDinheiroBR(valor) {
  if (valor === null || valor === undefined || valor === "--") return "--";
  const n = Number(valor);
  if (!Number.isFinite(n)) return "--";
  return n.toFixed(2);
}

function formatarDataLocal(dataISO) {
  if (!dataISO) return "";
  const d = new Date(dataISO);
  if (Number.isNaN(d.getTime())) return "";
  return d.toLocaleString();
}

function getUsuarioStoreID(usuario) {
  return String(
    usuario?.storeID
    ?? usuario?.storeid
    ?? usuario?.StoreID
    ?? usuario?.store_id
    ?? usuario?.lojaid
    ?? usuario?.lojaID
    ?? ""
  ).trim();
}

function getUsuarioNome(usuario) {
  return String(
    usuario?.NOME
    ?? usuario?.nome
    ?? usuario?.name
    ?? usuario?.dados?.nome
    ?? ""
  ).trim();
}

function getPedidoLojaID(pedido) {
  return String(
    pedido?.lojaid
    ?? pedido?.lojaID
    ?? pedido?.storeID
    ?? pedido?.storeid
    ?? ""
  ).trim();
}

function criarMapaLojas(usuarios) {
  const mapa = new Map();
  usuarios.forEach((usuario) => {
    const storeID = getUsuarioStoreID(usuario);
    const nome = getUsuarioNome(usuario);
    if (storeID && nome && !mapa.has(storeID)) {
      mapa.set(storeID, nome);
    }
  });
  return mapa;
}

function formatarLojaPedido(pedido) {
  const lojaID = getPedidoLojaID(pedido);
  if (!lojaID) return "-";

  const nomeLoja = lojasPorStoreID.get(lojaID);
  if (!nomeLoja) {
    return `<span style="color:#6b7280;">${escapeHtml(lojaID)}</span>`;
  }

  return `
    <strong>${escapeHtml(nomeLoja)}</strong>
    <div style="color:#6b7280; font-size:0.78rem; margin-top:2px;">LojaID: ${escapeHtml(lojaID)}</div>
  `;
}

function renderizarSelectLojaPedido(pedido) {
  if (!lojasDisponiveis.length) {
    return '<select class="loja-select" disabled><option>Lojas indisponíveis</option></select>';
  }

  const lojaAtual = getPedidoLojaID(pedido);
  const lojaAtualExiste = lojaAtual && lojasDisponiveis.some((loja) => obterStoreIdLoja(loja) === lojaAtual);
  const optionAtual = lojaAtual && !lojaAtualExiste
    ? `<option value="${escapeHtml(lojaAtual)}" selected>${escapeHtml(lojaAtual)}</option>`
    : (!lojaAtual ? '<option value="" selected disabled>Selecione a loja</option>' : "");
  const options = optionAtual + lojasDisponiveis.map((loja) => {
    const storeID = obterStoreIdLoja(loja);
    const nome = formatarOpcaoLoja(loja);
    const selected = storeID === lojaAtual ? " selected" : "";
    return `<option value="${escapeHtml(storeID)}"${selected}>${escapeHtml(nome)}</option>`;
  }).join("");

  return `
    <select class="loja-select" title="Alterar LojaID por nome"
      data-loja-atual="${escapeHtml(lojaAtual)}"
      onchange="alterarLojaPedidoSelect('${pedido.id}', '${encodeURIComponent(pedido.cliente_nome ?? "")}', this)">
      ${options}
    </select>
  `;
}

function renderizarOrcamentos(orcamentos, totalDisponivel = null) {
  const container = document.getElementById("orcamentosExistentes");
  container.innerHTML = "";

  if (!orcamentos || orcamentos.length === 0) {
    container.innerHTML = "<em>Nenhum orçamento encontrado.</em>";
    atualizarStatusOrcamentos("Nenhum resultado");
    return;
  }

  const table = document.createElement("table");
  table.innerHTML = `
    <thead>
      <tr>
        <th># Pedido</th>
        <th>Cliente</th>
        <th>Data Criação</th>
        <th>Qtd Total</th>
        <th>Status do pedido</th>
        <th>LojaID</th>
        <th>Valor Total (R$)</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;
  const tbody = table.querySelector("tbody");

  orcamentos.forEach((o) => {
    const tr = document.createElement("tr");

    const dataCriacao = formatarDataLocal(o.data_criacao);
    const qtdTotal = (o.quantidade_total ?? "--");
    const valorTotal = (o.valor_total ?? "--");

    // ✅ Exibição do status: usa status_label (backend)
    // ✅ Mantém número em dataset pra lógica/estilo
    const statusLabel = o.status_label ?? String(o.status ?? "Desconhecido");
    const statusNumero = (o.status ?? "");
    const statusValor = Number(statusNumero);
    const podeEditar = statusValor === 1;
    const podeVisualizar = statusValor >= 2 && statusValor <= 5;

    const actionsHtml = podeEditar
      ? `
        <div class="actions">
          <button class="icon-btn edit" title="Editar"
            onclick="editarOrcamento('${o.id}')">✏️</button>
          <button class="icon-btn edit" title="Alterar nome do cliente"
            onclick="alterarNomeCliente('${o.id}', '${encodeURIComponent(o.cliente_nome ?? "")}', '${encodeURIComponent(o.lojaid ?? "")}')">📝</button>
          ${usuarioPodeSelecionarLoja() ? renderizarSelectLojaPedido(o) : ""}

          <button class="icon-btn pay" title="Aprovar / Boleto"
            onclick="aprovarPedido('${o.id}')">🪙</button>
        </div>
      `
      : podeVisualizar
        ? `
          <div class="actions">
            <button class="icon-btn edit" title="Visualizar"
              onclick="visualizarOrcamento('${o.id}')">👁️</button>
          </div>
        `
        : "";

    tr.dataset.orcamentoId = o.id;
    tr.dataset.status = statusNumero;

    tr.innerHTML = `
      <td>${o.numero_pedido ?? ""}</td>
      <td>${o.cliente_nome ?? ""}</td>
      <td>${dataCriacao}</td>
      <td data-field="quantidade_total">${qtdTotal}</td>

      <!-- ✅ Aqui: mostra o texto amigável -->
      <td data-field="status_label">${statusLabel}</td>
      <td>${formatarLojaPedido(o)}</td>

      <td data-field="valor_total">${valorTotal === "--" ? "--" : formatarDinheiroBR(valorTotal)}</td>
      <td>${actionsHtml}</td>
    `;

    tbody.appendChild(tr);
  });

  container.appendChild(table);
  const totalBase = totalDisponivel ?? orcamentos.length;
  const statusMensagem = totalBase > orcamentos.length
    ? `${orcamentos.length} de ${totalBase} orçamento(s)`
    : `${orcamentos.length} orçamento(s)`;
  atualizarStatusOrcamentos(statusMensagem);
}

function aplicarFiltroOrcamentos() {
  atualizarListaOrcamentos();
}

function obterOrcamentosFiltrados() {
  const filtroEl = document.getElementById("orcamentoFiltro");
  const filtro = (filtroEl?.value || "").trim().toLowerCase();

  if (!filtro) {
    return orcamentosCache;
  }

  return orcamentosCache.filter((o) => {
    const cliente = (o.cliente_nome || "").toLowerCase();
    const pedido = String(o.numero_pedido || "");
    const statusLabel = (o.status_label || "").toLowerCase();
    return cliente.includes(filtro) || pedido.includes(filtro) || statusLabel.includes(filtro);
  });
}

function aplicarLimiteOrcamentos(orcamentos) {
  if (limiteOrcamentos === LIMITE_TODOS) {
    return orcamentos;
  }
  return orcamentos.slice(0, limiteOrcamentos);
}

function atualizarListaOrcamentos() {
  const filtrados = obterOrcamentosFiltrados();
  const visiveis = aplicarLimiteOrcamentos(filtrados);
  renderizarOrcamentos(visiveis, filtrados.length);
}

function normalizarLimite(valor) {
  if (valor === LIMITE_TODOS) return LIMITE_TODOS;
  const numero = Number(valor);
  return Number.isFinite(numero) ? numero : 10;
}

function atualizarBotoesLimite() {
  const botoes = document.querySelectorAll(".limit-btn");
  botoes.forEach((botao) => {
    const limite = normalizarLimite(botao.dataset.limit);
    const ativo = limiteOrcamentos === LIMITE_TODOS
      ? limite === LIMITE_TODOS
      : limite === limiteOrcamentos;
    botao.classList.toggle("active", ativo);
  });
}

function normalizarTextoLoja(valor) {
  return String(valor || "").trim();
}

function obterNomeLoja(loja) {
  return normalizarTextoLoja(loja?.nome || loja?.name || loja?.user || loja?.usuario || loja?.storeName);
}

function obterStoreIdLoja(loja) {
  return normalizarTextoLoja(
    loja?.storeID
    || loja?.storeid
    || loja?.lojaID
    || loja?.lojaid
    || loja?.storeId
    || loja
  );
}

function formatarOpcaoLoja(loja) {
  const nome = obterNomeLoja(loja);
  const storeID = obterStoreIdLoja(loja);
  return nome || storeID;
}

function encontrarLojaPorStoreId(storeID) {
  const alvo = normalizarTextoLoja(storeID);
  if (!alvo) return null;
  return lojasDisponiveis.find((loja) => obterStoreIdLoja(loja) === alvo) || null;
}

function encontrarLojaPorNome(nome) {
  const alvo = normalizarTextoLoja(nome).toLowerCase();
  if (!alvo) return null;
  return lojasDisponiveis.find((loja) => formatarOpcaoLoja(loja).toLowerCase() === alvo) || null;
}

async function carregarMapaLojas(USER_TOKEN) {
  const res = await fetch(`${BACKEND_URL}/api/usuarios`, {
    headers: USER_TOKEN ? { "Authorization": `Bearer ${USER_TOKEN}` } : {}
  });

  const data = await res.json();
  if (!res.ok || !Array.isArray(data?.usuarios)) {
    throw new Error(data?.error || "Falha ao carregar lojas.");
  }

  return criarMapaLojas(data.usuarios);
}

async function carregarOrcamentos() {
  const USER_TOKEN = getUserToken();

  try {
    atualizarStatusOrcamentos("Carregando...");

    const [res, mapaLojas] = await Promise.all([
      fetch(`${BACKEND_URL}/api/orcamentos`, {
        headers: {
          "Authorization": `Bearer ${USER_TOKEN}`
        }
      }),
      carregarMapaLojas(USER_TOKEN)
    ]);

    lojasPorStoreID = mapaLojas;

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();
    const orcamentos = data.orcamentos || [];
    const orcamentosOrdenados = [...orcamentos].reverse();

    orcamentosCache = orcamentosOrdenados;
    atualizarListaOrcamentos();


  } catch (err) {
    console.error("Erro ao carregar orçamentos:", err);
    const cont = document.getElementById("orcamentosExistentes");
    if (cont) cont.innerHTML = "<em>Erro ao carregar orçamentos.</em>";
    atualizarStatusOrcamentos("Erro ao carregar");
  }
}

async function alterarNomeCliente(uuid, nomeAtualEncoded, lojaAtualEncoded) {
  const USER_TOKEN = getUserToken();
  const nomeAtual = decodeURIComponent(nomeAtualEncoded || "").trim();
  const lojaAtual = decodeURIComponent(lojaAtualEncoded || "");
  const novoNome = prompt("Digite o novo nome do cliente:", nomeAtual || "");
  if (novoNome === null) return;

  const nomeLimpo = novoNome.trim();
  if (!nomeLimpo) {
    alert("Nome do cliente não pode ficar vazio.");
    return;
  }

  const novaLojaId = lojaAtual || "";

  try {
    const res = await fetch(`${BACKEND_URL}/api/orcamento/${encodeURIComponent(uuid)}/cliente`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${USER_TOKEN}`
      },
      body: JSON.stringify({
        cliente_nome: nomeLimpo,
        storeID: novaLojaId || undefined
      })
    });

    const data = await res.json();
    if (!res.ok || !data.success) {
      alert(data.error || "Não foi possível alterar o nome do cliente.");
      return;
    }

    alert("Pedido atualizado com sucesso.");
    await carregarOrcamentos();
  } catch (err) {
    console.error("Erro ao atualizar cliente:", err);
    alert("Erro ao atualizar cliente.");
  }
}

async function alterarLojaPedidoSelect(uuid, nomeAtualEncoded, select) {
  if (!usuarioPodeSelecionarLoja()) {
    alert("Seu usuário não tem permissão para alterar a loja do pedido.");
    return;
  }

  const USER_TOKEN = getUserToken();
  const nomeAtual = decodeURIComponent(nomeAtualEncoded || "").trim();
  const novaLojaId = select.value || "";
  const lojaAnterior = select.dataset.lojaAtual || "";

  if (!novaLojaId || novaLojaId === lojaAnterior) {
    select.value = lojaAnterior;
    return;
  }

  if (!nomeAtual) {
    alert("Não foi possível identificar o nome atual do cliente para atualizar o pedido.");
    select.value = lojaAnterior;
    return;
  }

  select.disabled = true;

  try {
    const res = await fetch(`${BACKEND_URL}/api/orcamento/${encodeURIComponent(uuid)}/cliente`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${USER_TOKEN}`
      },
      body: JSON.stringify({
        cliente_nome: nomeAtual,
        storeID: novaLojaId
      })
    });

    const data = await res.json();
    if (!res.ok || !data.success) {
      alert(data.error || "Não foi possível alterar a loja do pedido.");
      select.value = lojaAnterior;
      return;
    }

    alert("Loja do pedido atualizada com sucesso.");
    await carregarOrcamentos();
  } catch (err) {
    console.error("Erro ao atualizar loja do pedido:", err);
    alert("Erro ao atualizar loja do pedido.");
    select.value = lojaAnterior;
  } finally {
    select.disabled = false;
  }
}

let cliente = { nome: "", id: null };

async function registrarLogFichaCriada(USER_TOKEN, data, lojaID) {
  try {
    await fetch(`${BACKEND_URL}/api/financeiro/controle-log`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${USER_TOKEN}`
      },
      body: JSON.stringify({
        tipo: "alteracao",
        uuid: data.id || data.uuid || "-",
        numero_pedido: data.numero_pedido || "-",
        cliente_nome: data.cliente_nome || cliente.nome || "-",
        loja: lojaID || "-",
        lojaid: lojaID || "-",
        valor_total: 0,
        origem: "index_loja_criar_ficha",
        detalhe: "Ficha de orçamento criada no index_loja."
      })
    });
  } catch (err) {
    console.warn("Falha ao registrar log da ficha criada:", err);
  }
}

async function criarFichaCliente(){
  const USER_TOKEN = getUserToken();
  const nome = document.getElementById("clienteNome")?.value.trim();

  if (!nome) {
    alert("Digite o nome do cliente");
    return;
  }

  cliente.nome = nome;

  try {
    const lojaID = usuarioPodeSelecionarLoja()
      ? (storeSelecionada || userSession.storeid || undefined)
      : (userSession.storeid || undefined);

    const res = await fetch(`${BACKEND_URL}/api/orcamento`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${USER_TOKEN}`
      },
      body: JSON.stringify({
        cliente_nome: cliente.nome,
        storeID: lojaID
      })
    });

    if (!res.ok) {
      alert("Falha no servidor ao criar ficha.");
      return;
    }

    const data = await res.json();

    if (data.success) {
      cliente.id = data.id;
      await registrarLogFichaCriada(USER_TOKEN, data, lojaID);
      alert("Ficha criada com sucesso! ID: " + data.id);

      const form = document.getElementById("formCliente");
      if (form) form.style.display = "none";

      carregarOrcamentos();
    } else {
      alert("Erro ao criar ficha: " + (data.error || "Erro desconhecido"));
    }
  } catch (err) {
    console.error("Erro criarFichaCliente:", err);
    alert("Erro ao criar ficha, veja o console.");
  }
}

async function buscarLojasPorApi(USER_TOKEN) {
  const res = await fetch(`${BACKEND_URL}/api/clientes/storeids`, {
    headers: { "Authorization": `Bearer ${USER_TOKEN}` }
  });

  if (!res.ok) {
    throw new Error(`HTTP ${res.status}`);
  }

  const data = await res.json();
  return Array.isArray(data.stores) && data.stores.length
    ? data.stores
    : (Array.isArray(data.storeIds) ? data.storeIds : []);
}

async function buscarLojasPorUsuarios(USER_TOKEN) {
  const res = await fetch(`${BACKEND_URL}/api/usuarios`, {
    headers: { "Authorization": `Bearer ${USER_TOKEN}` }
  });

  if (!res.ok) {
    throw new Error(`HTTP ${res.status}`);
  }

  const data = await res.json();
  return Array.isArray(data.usuarios) ? data.usuarios : [];
}

function popularSeletorLojas(lista, select, wrap) {
  lojasDisponiveis = lista
    .map((loja) => ({
      storeID: obterStoreIdLoja(loja),
      nome: obterNomeLoja(loja) || obterStoreIdLoja(loja)
    }))
    .filter((loja) => loja.storeID && loja.nome)
    .sort((a, b) => a.nome.localeCompare(b.nome, "pt-BR", { sensitivity: "base" }));

  if (!lojasDisponiveis.length) return false;

  select.innerHTML = "";
  lojasDisponiveis.forEach((loja) => {
    const opt = document.createElement("option");
    opt.value = loja.storeID;
    opt.textContent = loja.nome;
    select.appendChild(opt);
  });

  const preferida = userSession.storeid && encontrarLojaPorStoreId(userSession.storeid)
    ? String(userSession.storeid)
    : lojasDisponiveis[0].storeID;

  select.value = preferida;
  storeSelecionada = preferida;
  select.onchange = () => {
    storeSelecionada = select.value || null;
  };
  wrap.style.display = "flex";
  return true;
}

async function carregarStoreIds() {
  if (!usuarioPodeSelecionarLoja()) return;

  const USER_TOKEN = getUserToken();
  const wrap = document.getElementById("storeSelectorWrap");
  const select = document.getElementById("storeSelector");
  if (!wrap || !select) return;

  try {
    let lista = [];

    try {
      lista = await buscarLojasPorApi(USER_TOKEN);
    } catch (apiErr) {
      console.warn("Falha em /api/clientes/storeids, tentando /api/usuarios:", apiErr);
      lista = await buscarLojasPorUsuarios(USER_TOKEN);
    }

    if (!popularSeletorLojas(lista, select, wrap)) {
      console.warn("Nenhuma loja com nome e StoreID encontrada.");
    }
  } catch (err) {
    console.error("Erro ao carregar lojas:", err);
  }
}

validarSessao().then(async (ok) => {
  if (ok) {
    await carregarStoreIds();
    carregarOrcamentos();

      botao.addEventListener("click", () => {

        atualizarBotoesLimite();
        atualizarListaOrcamentos();
      });
    });
    atualizarBotoesLimite();
  }
});
