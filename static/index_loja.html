<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamentos | ColorGlass</title>
<!-- =====================
     FAVICON DEFINITIVO
     ===================== -->

<!-- Principal (Render - raiz do site) -->
<link rel="icon" href="/favicon.ico?v=4" sizes="any">
<link rel="shortcut icon" href="/favicon.ico?v=4">
  
<!-- Backup em PNG (Supabase) -->
<link rel="icon" type="image/png" sizes="512x512"
        href="https://hfhwvzldhgqniqnurync.supabase.co/storage/v1/object/public/teste/logo-512.png?v=4">
  
<link rel="apple-touch-icon" sizes="180x180"
        href="https://hfhwvzldhgqniqnurync.supabase.co/storage/v1/object/public/teste/logo-512.png?v=4">
  
<!-- Cor do navegador (mobile / Android) -->
<meta name="theme-color" content="#1079ba">

<meta name="description" content="Orçamentos e pedidos da ColorGlass.">
<meta name="robots" content="index, follow">
<script src="global.js"></script>
<style>
/* =====================
   ESTÉTICA NOVA (login/aprovacao-like)
   ⚠️ MECÂNICA INTACTA
   ===================== */

:root{
  --cg-blue:#1079ba;
  --cg-blue-dark:#0d5d8c;
  --cg-blue-soft:#e7f3fb;
  --cg-gold:#f0c24c;
  --cg-white:#ffffff;
  --cg-text:#1f2933;
  --cg-muted:#6b7280;
  --cg-border:rgba(16,121,186,0.12);
  --cg-shadow: 0 12px 30px rgba(15, 44, 62, 0.12);
  --cg-shadow-soft: 0 10px 24px rgba(15,44,62,0.10);
}

/* RESET BÁSICO */
* { box-sizing: border-box; margin:0; padding:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

/* FUNDO igual vibe do aprovacao/login */
body{
  min-height: 100vh;
  display: flex;
  background:
    radial-gradient(circle at top, rgba(16,121,186,0.16), transparent 55%),
    linear-gradient(135deg, #f5fbff 0%, #eef4f9 45%, #f8fbff 100%);
  color: var(--cg-text);
}

/* APP WRAPPER */
.app {
  display: flex;
  width: 100%;
  gap: 18px;
  padding: 18px;
  animation: fadeIn 0.7s ease;
}

/* SIDEBAR — ainda azul, mas mais “card” como login */
.sidebar{
  width: 240px;
  background: linear-gradient(135deg, var(--cg-blue), var(--cg-blue-dark));
  color: #fff;
  display: flex;
  flex-direction: column;
  padding: 22px 18px;
  gap: 12px;
  border-radius: 18px;
  box-shadow: var(--cg-shadow);
  position: sticky;
  top: 18px;
  height: calc(100vh - 36px);
  overflow: hidden;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.sidebar::after{
  content:"";
  position:absolute;
  right:-90px;
  top:-120px;
  width: 260px;
  height: 260px;
  background: radial-gradient(circle, rgba(255,255,255,0.22), transparent 60%);
  pointer-events:none;
}

.sidebar:hover{
  transform: translateY(-2px);
  box-shadow: 0 16px 36px rgba(15,44,62,0.16);
}

.sidebar h3{
  font-size: 1.25rem;
  margin-bottom: 6px;
  letter-spacing: 0.8px;
  transition: transform .25s ease, opacity .25s ease;
  position: relative;
  z-index: 1;
}

.sidebar h3:hover{
  transform: translateY(-1px);
  opacity: 0.95;
}

/* BOTÕES SIDEBAR */
.sidebar button{
  background: rgba(255,255,255,0.14);
  padding: 12px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.18);
  cursor: pointer;
  text-align: left;
  font-weight: 600;
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
  color: #fff;
  position: relative;
  z-index: 1;
}

.sidebar button:hover{
  background: rgba(255,255,255,0.22);
  transform: translateX(4px);
  box-shadow: 0 10px 18px rgba(0,0,0,0.14);
}

/* CONTENT como “cards” */
.content{
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  border-radius: 18px;
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(16,121,186,0.10);
  box-shadow: var(--cg-shadow-soft);
  backdrop-filter: blur(10px);
  animation: floatIn 0.6s ease;
}

/* Títulos */
.content h1{
  color: var(--cg-blue-dark);
  font-size: 1.6rem;
  margin-bottom: 14px;
}

.content h2{
  margin-top: 10px;
  color: var(--cg-blue);
  font-size: 1.15rem;
}

/* FORMULÁRIOS — card estilo aprovacao */
#formCliente{
  background: var(--cg-white);
  padding: 20px;
  border-radius: 18px;
  margin: 14px 0 22px;
  box-shadow: var(--cg-shadow-soft);
  border: 1px solid var(--cg-border);
  position: relative;
  overflow: hidden;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

#formCliente::before{
  content:"";
  position:absolute;
  inset:0;
  background: linear-gradient(120deg, rgba(16,121,186,0.10), transparent 55%);
  opacity: 0;
  transition: opacity 0.25s ease;
  pointer-events:none;
}
#formCliente:hover{
  transform: translateY(-2px);
  box-shadow: 0 14px 34px rgba(15,44,62,0.14);
}
#formCliente:hover::before{ opacity: 1; }

#formCliente label{
  font-size: 0.95rem;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  color: #374151;
}

#formCliente input{
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid #d4d9df;
  margin-top: 0;
  background: #fdfefe;
  transition: border 0.2s ease, box-shadow 0.2s ease;
}

#formCliente input:focus{
  border-color: var(--cg-blue);
  box-shadow: 0 0 0 3px rgba(16,121,186,0.15);
  outline: none;
}

/* BOTÕES — gradiente igual aprovacao */
.btn{
  padding: 12px 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--cg-blue), var(--cg-blue-dark));
  color: #fff;
  font-weight: 800;
  margin-top: 10px;
  transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
  box-shadow: 0 10px 18px rgba(16,121,186,0.22);
}

.btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 14px 24px rgba(16,121,186,0.26);
}

.btn:active{ transform: translateY(0); }

/* TOOLBAR — estilo input “clean” */
.orcamentos-toolbar{
  display: flex;
  gap: 12px;
  align-items: center;
  margin: 12px 0 12px;
  flex-wrap: wrap;
}

.orcamentos-toolbar input{
  flex: 1;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid #d4d9df;
  background: #fff;
  transition: border .2s ease, box-shadow .2s ease, transform .2s ease;
}

.orcamentos-toolbar input:focus{
  border-color: var(--cg-blue);
  box-shadow: 0 0 0 3px rgba(16,121,186,0.15);
  outline: none;
}

.orcamentos-toolbar input:hover{
  transform: translateY(-1px);
}

.orcamentos-toolbar .meta{
  font-size: .86rem;
  color: var(--cg-muted);
}

/* LIMITES */
.limit-group{
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.limit-group .limit-btn{
  background: #fff;
  border: 1px solid #d4d9df;
  color: #374151;
  padding: 8px 12px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 700;
}
.limit-group .limit-btn.active{
  border-color: var(--cg-blue);
  color: var(--cg-blue-dark);
  background: var(--cg-blue-soft);
}

/* TABELA */
#orcamentosExistentes{
  margin-top: 10px;
}
#orcamentosExistentes table{
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border: 1px solid var(--cg-border);
  border-radius: 14px;
  overflow: hidden;
}
#orcamentosExistentes th, #orcamentosExistentes td{
  padding: 10px 10px;
  border-bottom: 1px solid #edf2f7;
  text-align: left;
  font-size: .92rem;
}
#orcamentosExistentes th{
  background: #f7fbff;
  color: #1f3f56;
}
#orcamentosExistentes tr:hover td{
  background: #fafcff;
}
.status-chip{
  display: inline-block;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: .78rem;
  font-weight: 700;
  border: 1px solid transparent;
}
.st-0{ background:#ffe9e9; color:#9b1c1c; border-color:#ffc7c7; }
.st-1{ background:#fff7d6; color:#7a5a00; border-color:#ffe29a; }
.st-2{ background:#e5f4ff; color:#0b5d8f; border-color:#bfe4ff; }
.st-3{ background:#eafcf2; color:#166534; border-color:#bfeecf; }
.st-4{ background:#f4f1ff; color:#4c1d95; border-color:#ddd2ff; }
.st-5{ background:#e8fff3; color:#0d7a42; border-color:#b7f1cf; }

.actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.actions .btn{
  margin-top:0;
  padding:8px 10px;
  border-radius:10px;
  font-size:.82rem;
  font-weight:700;
  box-shadow:none;
}
.btn-secondary{
  background: #fff;
  color: #1f3f56;
  border: 1px solid #cfe3f2;
}
.btn-danger{
  background: linear-gradient(135deg, #d74343, #b82020);
}
.small{
  font-size: .84rem;
  color: var(--cg-muted);
}

/* ANIMAÇÕES */
@keyframes fadeIn {
  from { opacity:0; transform: translateY(6px);}
  to   { opacity:1; transform: translateY(0);}
}
@keyframes floatIn{
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* RESPONSIVO */
@media (max-width: 1120px){
  .app{ flex-direction: column; }
  .sidebar{
    width: 100%;
    height: auto;
    position: relative;
    top: 0;
  }
}

@media (max-width: 760px){
  .content{
    padding: 14px;
  }
  #orcamentosExistentes{
    overflow-x:auto;
  }
  #orcamentosExistentes table{
    min-width: 980px;
  }
}
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <h3>ColorGlass</h3>
    <button onclick="go('index_loja.html')">🏠 Início</button>
    <button onclick="go('portas.html')">🚪 Novo orçamento</button>
    <button onclick="go('controle_loja.html')">📦 Controle loja</button>
    <button onclick="logout()">🚪 Sair</button>
  </aside>

  <main class="content">
    <h1>Orçamento de Portas</h1>

    <form id="formCliente" onsubmit="event.preventDefault(); criarNovoOrcamento();">
      <label>Nome do Cliente:
        <input type="text" id="cliente_nome" required placeholder="Digite o nome do cliente">
      </label>
      <button class="btn" type="submit">Criar novo orçamento</button>
      <div class="small" style="margin-top:8px;">Ao criar, você será redirecionado para edição do orçamento.</div>
    </form>

    <h2>Orçamentos Existentes</h2>

    <div class="orcamentos-toolbar">
      <input
        id="filtroOrcamentos"
        type="text"
        placeholder="Buscar por cliente, pedido, loja, status..."
        oninput="atualizarListaOrcamentos()"
      />
      <span class="meta" id="statusOrcamentosMeta">Carregando...</span>
    </div>

    <div class="limit-group" id="grupoLimite">
      <span class="small">Mostrar:</span>
      <button type="button" class="limit-btn active" data-limit="10" onclick="definirLimiteOrcamentos(10)">10</button>
      <button type="button" class="limit-btn" data-limit="20" onclick="definirLimiteOrcamentos(20)">20</button>
      <button type="button" class="limit-btn" data-limit="50" onclick="definirLimiteOrcamentos(50)">50</button>
      <button type="button" class="limit-btn" data-limit="all" onclick="definirLimiteOrcamentos('all')">Todos</button>
    </div>

    <div id="orcamentosExistentes"><em>Carregando...</em></div>
  </main>
</div>

<script>
const BACKEND_URL = "https://colorglass.onrender.com";
const LIMITE_TODOS = "all";
let limiteOrcamentos = 10;
let orcamentosCache = [];
let userSession = {
  level: 0,
  storeid: null
};

function go(page){ window.location.href = page; }

function logout(){
  localStorage.removeItem("USER_TOKEN");
  localStorage.removeItem("ADMIN_TOKEN");
  localStorage.removeItem("USER");
  window.location.href = "login.html";
}

function getUserToken(){
  return (
    localStorage.getItem("USER_TOKEN") ||
    localStorage.getItem("ADMIN_TOKEN") ||
    ""
  );
}

function formatarDinheiroBR(valor){
  const n = Number(valor);
  if (!Number.isFinite(n)) return "--";
  return n.toLocaleString("pt-BR", { style:"currency", currency:"BRL" });
}

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function statusLabel(status){
  const map = {
    0: "Cancelado",
    1: "Orçamento",
    2: "Aprovado",
    3: "Em Produção",
    4: "Separado",
    5: "Entregue"
  };
  const key = Number(status);
  return map[key] || "Desconhecido";
}

function classeStatus(status){
  const k = Number(status);
  if ([0,1,2,3,4,5].includes(k)) return `st-${k}`;
  return "st-1";
}

function atualizarStatusOrcamentos(texto){
  const el = document.getElementById("statusOrcamentosMeta");
  if (el) el.textContent = texto;
}

function buildUrlComToken(baseUrl){
  const token = getUserToken();
  if (!token) return baseUrl;
  const url = new URL(baseUrl, window.location.origin);
  url.searchParams.set("token", token);
  return url.pathname + url.search;
}

async function validarSessao(){
  const token = getUserToken();
  if(!token){
    logout();
    return false;
  }

  try{
    const res = await fetch(`${BACKEND_URL}/api/auth/validar`, {
      method: "POST",
      headers: {
        "Content-Type":"application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ token })
    });

    if(!res.ok){
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();
    if(!data.success){
      throw new Error(data.error || "Sessão inválida");
    }

    userSession.level = Number(data.level || 0);
    userSession.storeid = data.storeid || null;

    return true;
  }catch(err){
    console.error("Falha na validação:", err);
    logout();
    return false;
  }
}

async function criarNovoOrcamento(){
  const USER_TOKEN = getUserToken();
  const clienteNome = document.getElementById("cliente_nome").value.trim();

  if(!clienteNome){
    alert("Informe o nome do cliente.");
    return;
  }

  const payload = { cliente_nome: clienteNome };

  if (userSession.level === 1 && userSession.storeid) {
    payload.storeID = userSession.storeid;
  }

  try{
    const res = await fetch(`${BACKEND_URL}/api/orcamento`, {
      method: "POST",
      headers: {
        "Content-Type":"application/json",
        "Authorization": `Bearer ${USER_TOKEN}`
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if(!res.ok || !data.success){
      alert(data.error || "Erro ao criar orçamento.");
      return;
    }

    const baseUrl = `/portas.html?orcamento_uuid=${encodeURIComponent(data.id || data.uuid)}`;
    window.location.href = buildUrlComToken(baseUrl);

  }catch(err){
    console.error(err);
    alert("Erro ao criar orçamento.");
  }
}

function obterOrcamentosFiltrados() {
  const filtroEl = document.getElementById("filtroOrcamentos");
  const termo = (filtroEl?.value || "").trim().toLowerCase();

  if (!termo) return orcamentosCache;

  return orcamentosCache.filter((o) => {
    const numero = String(o.numero_pedido ?? "");
    const nome = String(o.cliente_nome ?? "").toLowerCase();
    const loja = String(o.lojaid ?? "").toLowerCase();
    const statusTxt = statusLabel(o.status).toLowerCase();
    return (
      numero.includes(termo) ||
      nome.includes(termo) ||
      loja.includes(termo) ||
      statusTxt.includes(termo)
    );
  });
}

function renderizarOrcamentos(orcamentos, totalDisponivel = null) {
  const cont = document.getElementById("orcamentosExistentes");
  if (!cont) return;

  if (!orcamentos.length) {
    cont.innerHTML = "<em>Nenhum orçamento encontrado.</em>";
    const totalBase = totalDisponivel ?? 0;
    atualizarStatusOrcamentos(totalBase ? `0 de ${totalBase} orçamento(s)` : "0 orçamento(s)");
    return;
  }

  let html = `
    <table>
      <thead>
        <tr>
          <th># Pedido</th>
          <th>Cliente</th>
          <th>Loja</th>
          <th>Status</th>
          <th>Qtd Total</th>
          <th>Data</th>
          <th>Valor Total (R$)</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
  `;

  orcamentos.forEach((o) => {
    const uuid = o.id;
    const numeroPedido = escapeHtml(o.numero_pedido ?? "--");
    const cliente = escapeHtml(o.cliente_nome ?? "--");
    const lojaId = escapeHtml(o.lojaid ?? "--");
    const statusNum = Number(o.status ?? 1);
    const statusTxt = statusLabel(statusNum);
    const qtdTotal = (o.quantidade_total ?? "--");
    const valorTotal = (o.valor_total ?? "--");
    const data = o.data_criacao
      ? new Date(o.data_criacao).toLocaleString("pt-BR")
      : "--";

    const podeEditar = [1,2,3,4].includes(statusNum);
    const podeAprovar = statusNum === 1;
    const podeVisualizar = [2,3,4,5].includes(statusNum);
    const podeCancelar = statusNum !== 0;

    const nomeEnc = encodeURIComponent(o.cliente_nome ?? "");
    const lojaEnc = encodeURIComponent(o.lojaid ?? "");

    html += `
      <tr data-orcamento-id="${escapeHtml(uuid)}">
        <td>${numeroPedido}</td>
        <td>${cliente}</td>
        <td>${lojaId}</td>
        <td>
          <span class="status-chip ${classeStatus(statusNum)}">
            ${statusNum} - ${escapeHtml(statusTxt)}
          </span>
        </td>
        <td data-field="quantidade_total">${qtdTotal}</td>
        <td>${escapeHtml(data)}</td>
        <td data-field="valor_total">${valorTotal === "--" ? "--" : formatarDinheiroBR(valorTotal)}</td>
        <td>
          <div class="actions">
            ${podeEditar ? `<button class="btn btn-secondary" onclick="editarOrcamento('${escapeHtml(uuid)}')">Editar</button>` : ""}
            ${podeAprovar ? `<button class="btn" onclick="aprovarPedido('${escapeHtml(uuid)}')">Aprovar</button>` : ""}
            ${podeVisualizar ? `<button class="btn btn-secondary" onclick="visualizarOrcamento('${escapeHtml(uuid)}')">Visualizar</button>` : ""}
            <button class="btn btn-secondary" onclick="alterarNomeCliente('${escapeHtml(uuid)}','${nomeEnc}','${lojaEnc}')">Cliente</button>
            ${podeCancelar ? `<button class="btn btn-danger" onclick="cancelarOrcamento('${escapeHtml(uuid)}')">Cancelar</button>` : ""}
          </div>
        </td>
      </tr>
    `;
  });

  html += "</tbody></table>";
  cont.innerHTML = html;

  const totalBase = totalDisponivel ?? orcamentos.length;
  const statusMensagem = totalBase > orcamentos.length
    ? `${orcamentos.length} de ${totalBase} orçamento(s)`
    : `${orcamentos.length} orçamento(s)`;
  atualizarStatusOrcamentos(statusMensagem);
}

function definirLimiteOrcamentos(limite) {
  if (limite === LIMITE_TODOS || limite === "all") {
    limiteOrcamentos = LIMITE_TODOS;
  } else {
    const valor = Number(limite);
    limiteOrcamentos = Number.isFinite(valor) ? valor : 10;
  }
  atualizarBotoesLimite();
  atualizarListaOrcamentos();
}

function aplicarLimiteOrcamentos(orcamentos) {
  if (limiteOrcamentos === LIMITE_TODOS) {
    return orcamentos;
  }
  return orcamentos.slice(0, limiteOrcamentos);
}

function atualizarListaOrcamentos() {
  const filtrados = obterOrcamentosFiltrados();
  const visiveis = aplicarLimiteOrcamentos(filtrados);
  renderizarOrcamentos(visiveis, filtrados.length);
}

function normalizarLimite(valor) {
  if (valor === LIMITE_TODOS) return LIMITE_TODOS;
  const numero = Number(valor);
  return Number.isFinite(numero) ? numero : 10;
}

function atualizarBotoesLimite() {
  const botoes = document.querySelectorAll(".limit-btn");
  botoes.forEach((botao) => {
    const limite = normalizarLimite(botao.dataset.limit);
    const ativo = limiteOrcamentos === LIMITE_TODOS
      ? limite === LIMITE_TODOS
      : limite === limiteOrcamentos;
    botao.classList.toggle("active", ativo);
  });
}

async function carregarOrcamentos() {
  const USER_TOKEN = getUserToken();

  try {
    atualizarStatusOrcamentos("Carregando...");

    const res = await fetch(`${BACKEND_URL}/api/orcamentos`, {
      headers: {
        "Authorization": `Bearer ${USER_TOKEN}`
      }
    });

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();
    const orcamentos = data.orcamentos || [];
    const orcamentosOrdenados = [...orcamentos].reverse();

    orcamentosCache = orcamentosOrdenados;
    atualizarListaOrcamentos();


  } catch (err) {
    console.error("Erro ao carregar orçamentos:", err);
    const cont = document.getElementById("orcamentosExistentes");
    if (cont) cont.innerHTML = "<em>Erro ao carregar orçamentos.</em>";
    atualizarStatusOrcamentos("Erro ao carregar");
  }
}

// ✏️ EDITAR ORÇAMENTO
function editarOrcamento(uuid){
  const baseUrl = `/portas.html?orcamento_uuid=${encodeURIComponent(uuid)}`;
  window.location.href = buildUrlComToken(baseUrl);
}

// 🪙 APROVAÇÃO / BOLETO
function aprovarPedido(uuid){
  const baseUrl = `/aprovacao.html?orcamento_uuid=${encodeURIComponent(uuid)}`;
  window.location.href = buildUrlComToken(baseUrl);
}

// 👁️ VISUALIZAR
function visualizarOrcamento(uuid){
  const baseUrl = `/vizualizacao.html?orcamento_uuid=${encodeURIComponent(uuid)}`;
  window.location.href = buildUrlComToken(baseUrl);
}

async function alterarNomeCliente(uuid, nomeAtualEncoded, lojaAtualEncoded) {
  const USER_TOKEN = getUserToken();
  const nomeAtual = decodeURIComponent(nomeAtualEncoded || "");
  const lojaAtual = decodeURIComponent(lojaAtualEncoded || "");
  const novoNome = prompt("Digite o novo nome do cliente:", nomeAtual || "");
  if (novoNome === null) return;

  const nomeLimpo = novoNome.trim();
  if (!nomeLimpo) {
    alert("Nome do cliente não pode ficar vazio.");
    return;
  }

  let novaLojaId = lojaAtual || "";
  if (userSession.level === 2 || userSession.level === 3) {
    const lojaDigitada = prompt("Digite o StoreID para atrelar ao pedido:", lojaAtual || (userSession.storeid || ""));
    if (lojaDigitada === null) return;
    novaLojaId = lojaDigitada.trim();
    if (!novaLojaId) {
      alert("StoreID não pode ficar vazio.");
      return;
    }
  }

  try {
    const res = await fetch(`${BACKEND_URL}/api/orcamento/${encodeURIComponent(uuid)}/cliente`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${USER_TOKEN}`
      },
      body: JSON.stringify({
        cliente_nome: nomeLimpo,
        storeID: novaLojaId || undefined
      })
    });

    const data = await res.json();
    if (!res.ok || !data.success) {
      alert(data.error || "Não foi possível alterar o nome do cliente.");
      return;
    }

    alert("Cliente atualizado com sucesso.");
    await carregarOrcamentos();
  } catch (err) {
    console.error(err);
    alert("Erro ao atualizar cliente.");
  }
}

async function cancelarOrcamento(uuid){
  const USER_TOKEN = getUserToken();
  const confirmar = confirm("Tem certeza que deseja cancelar este orçamento?");
  if(!confirmar) return;

  try{
    const res = await fetch(`${BACKEND_URL}/api/orcamento/${encodeURIComponent(uuid)}/status`, {
      method: "POST",
      headers: {
        "Content-Type":"application/json",
        "Authorization": `Bearer ${USER_TOKEN}`
      },
      body: JSON.stringify({ status: 0 })
    });

    const data = await res.json();
    if(!res.ok || !data.success){
      alert(data.error || "Erro ao cancelar orçamento.");
      return;
    }

    alert("Orçamento cancelado com sucesso.");
    await carregarOrcamentos();

  }catch(err){
    console.error(err);
    alert("Erro ao cancelar orçamento.");
  }
}

(async function init(){
  const ok = await validarSessao();
  if (!ok) return;

  atualizarBotoesLimite();
  carregarOrcamentos();
})();
