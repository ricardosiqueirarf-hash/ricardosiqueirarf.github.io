<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ColorGlass Sistema</title>
  <meta name="description" content="App interno da ColorGlass." />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#1079ba" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml" />
  <style>
    :root {
      --cg-blue: #1079ba;
      --cg-blue-dark: #0d5d8c;
      --cg-blue-soft: #e7f3fb;
      --cg-border: rgba(16, 121, 186, 0.14);
      --cg-text: #1f2933;
      --cg-muted: #6b7280;
      --cg-white: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(16,121,186,0.16), transparent 55%), linear-gradient(135deg, #f5fbff 0%, #eef4f9 45%, #f8fbff 100%);
      color: var(--cg-text);
      padding: 28px 18px;
      display: flex;
      justify-content: center;
    }
    .app { width: min(520px, 100%); display: flex; flex-direction: column; gap: 18px; }
    .hero {
      background: var(--cg-white);
      border: 1px solid var(--cg-border);
      border-radius: 22px;
      box-shadow: 0 14px 34px rgba(15, 44, 62, 0.14);
      padding: 24px;
      text-align: center;
    }
    .logo { width: 76px; height: 76px; margin: 0 auto 14px; border-radius: 22px; box-shadow: 0 10px 24px rgba(16,121,186,0.25); overflow: hidden; background: #fff; }
    .logo img { width: 100%; height: 100%; display: block; }
    h1 { font-size: 1.7rem; color: var(--cg-blue-dark); margin-bottom: 6px; }
    p { color: var(--cg-muted); line-height: 1.45; font-size: 0.96rem; }
    .grid { display: grid; gap: 12px; }
    .card-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      text-decoration: none;
      color: inherit;
      background: var(--cg-white);
      border: 1px solid var(--cg-border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(15,44,62,0.10);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card-link:active, .card-link:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(15,44,62,0.14); }
    .left { display: flex; align-items: center; gap: 13px; }
    .icon { width: 44px; height: 44px; border-radius: 14px; background: var(--cg-blue-soft); display: grid; place-items: center; font-size: 1.32rem; }
    .title { font-weight: 800; color: var(--cg-blue-dark); font-size: 1rem; }
    .subtitle { color: var(--cg-muted); font-size: 0.85rem; margin-top: 2px; }
    .arrow { color: var(--cg-blue); font-weight: 900; font-size: 1.2rem; }
    .footer { text-align: center; color: var(--cg-muted); font-size: 0.82rem; padding: 4px 0 12px; }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="logo"><img src="/static/icons/icon.svg" alt="ColorGlass"></div>
      <h1>ColorGlass Sistema</h1>
      <p>App interno com acesso rápido às telas principais da operação.</p>
    </section>

    <section class="grid" aria-label="Atalhos do sistema">
      <a class="card-link" href="/login.html"><div class="left"><div class="icon">🔐</div><div><div class="title">Login</div><div class="subtitle">Entrar no sistema</div></div></div><div class="arrow">›</div></a>
      <a class="card-link" href="/index_loja.html"><div class="left"><div class="icon">🏪</div><div><div class="title">Loja</div><div class="subtitle">Área da loja</div></div></div><div class="arrow">›</div></a>
      <a class="card-link" href="/aprovacao.html"><div class="left"><div class="icon">✅</div><div><div class="title">Aprovação</div><div class="subtitle">Solicitar aprovação de pedidos</div></div></div><div class="arrow">›</div></a>
      <a class="card-link" href="/portas.html"><div class="left"><div class="icon">🚪</div><div><div class="title">Portas</div><div class="subtitle">Tela de portas</div></div></div><div class="arrow">›</div></a>
      <a class="card-link" href="/controle_loja.html"><div class="left"><div class="icon">📋</div><div><div class="title">Controle Loja</div><div class="subtitle">Status da produção</div></div></div><div class="arrow">›</div></a>
    </section>

    <div class="footer">ColorGlass • Sistema interno</div>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/service-worker.js")
        .catch((err) => console.warn("Service worker não registrado:", err));
    }
  </script>
</body>
</html>
