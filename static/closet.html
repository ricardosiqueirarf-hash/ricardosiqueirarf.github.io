<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closet | ColorGlass</title>
<link rel="icon" href="/favicon.ico?v=4" sizes="any">
<script src="global.js"></script>
<style>
:root{--cg-blue:#1079ba;--cg-blue-dark:#0d5d8c;--cg-blue-soft:#e7f3fb;--cg-shadow:0 12px 30px rgba(15,44,62,.12)}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}body{min-height:100vh;background:radial-gradient(circle at top,rgba(16,121,186,.16),transparent 55%),linear-gradient(135deg,#f5fbff,#eef4f9 45%,#f8fbff);color:#1f2933}.app{display:grid;grid-template-columns:240px 1fr;gap:18px;padding:18px;min-height:100vh}.sidebar{background:linear-gradient(135deg,var(--cg-blue),var(--cg-blue-dark));color:#fff;border-radius:18px;box-shadow:var(--cg-shadow);padding:22px 18px;display:flex;flex-direction:column;gap:12px}.sidebar h3{font-size:1.25rem;margin-bottom:8px}.sidebar button{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:#fff;padding:12px;border-radius:12px;cursor:pointer;text-align:left;font-weight:800}.content{display:grid;place-items:center;border-radius:18px;background:rgba(255,255,255,.62);border:1px solid rgba(16,121,186,.10);box-shadow:0 10px 24px rgba(15,44,62,.10);padding:24px}.card{max-width:620px;width:100%;background:#fff;border:1px solid rgba(16,121,186,.12);border-radius:20px;box-shadow:var(--cg-shadow);padding:28px;text-align:center}.card h1{color:var(--cg-blue-dark);margin-bottom:10px}.status{display:inline-block;margin-top:16px;padding:10px 16px;border-radius:999px;background:var(--cg-blue-soft);color:var(--cg-blue-dark);font-weight:950;letter-spacing:.08em}@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{flex-direction:row;flex-wrap:wrap}.sidebar button{flex:1;text-align:center}}
</style>
</head>
<body>
<div class="app"><aside class="sidebar"><h3>COLOR GLASS</h3><button onclick="voltarClasses()">Voltar</button></aside><main class="content"><section class="card"><h1>Closet Evidence</h1><p>Esta classe ficará separada da tela de portas para evitar conflito de cálculo e preview.</p><div class="status">INDISPONIVEL</div></section></main></div>
<script>
const params=new URLSearchParams(window.location.search);function voltarClasses(){const uuid=params.get('orcamento_uuid');const token=localStorage.getItem('USER_TOKEN')||params.get('token')||'';let url='classes.html';if(uuid){url+=`?orcamento_uuid=${encodeURIComponent(uuid)}`;if(token)url+=`&token=${encodeURIComponent(token)}`;}window.location.href=url;}
</script>
</body>
</html>
