<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status da Produção | ColorGlass</title>
  <meta name="description" content="Acompanhamento de produção dos pedidos da loja." />
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root {
      --cg-blue: #1079ba;
      --cg-blue-dark: #0d5d8c;
      --cg-blue-soft: #e7f3fb;
      --cg-border: rgba(16, 121, 186, 0.12);
      --cg-text: #1f2933;
      --cg-muted: #6b7280;
      --cg-white: #ffffff;
      --ok: #0c7c3c;
      --err: #c23616;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(16,121,186,0.14), transparent 52%),
        linear-gradient(135deg, #f5fbff 0%, #eef4f9 45%, #f8fbff 100%);
      color: var(--cg-text);
      padding: 28px 16px;
    }

    .page {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      background: var(--cg-white);
      border: 1px solid var(--cg-border);
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(15, 44, 62, 0.12);
      padding: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand h1 {
      color: var(--cg-blue-dark);
      font-size: 1.45rem;
      margin-bottom: 4px;
    }

    .brand p {
      color: #4b5563;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--cg-blue-soft);
      color: var(--cg-blue-dark);
      font-size: 0.84rem;
      margin-bottom: 10px;
    }

    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f0c24c;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--cg-blue), var(--cg-blue-dark));
      color: #fff;
      box-shadow: 0 8px 16px rgba(16, 121, 186, 0.22);
    }

    .btn-outline {
      background: #fff;
      color: var(--cg-blue-dark);
      border: 1px solid rgba(16,121,186,0.25);
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 12px;
      font-size: 0.93rem;
      min-height: 20px;
      color: #4b5563;
    }
    .status.ok { color: var(--ok); }
    .status.erro { color: var(--err); }

    .table-wrap {
      overflow-x: auto;
      margin-top: 16px;
      border: 1px solid rgba(16,121,186,0.14);
      border-radius: 12px;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      font-size: 0.93rem;
      background: #fff;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid rgba(16,121,186,0.08);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--cg-blue-dark);
      background: rgba(231, 243, 251, 0.55);
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .muted { color: var(--cg-muted); }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      background: rgba(16,121,186,0.12);
      color: var(--cg-blue-dark);
      white-space: nowrap;
    }

    .empty {
      padding: 20px;
      text-align: center;
      color: var(--cg-muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="pill">Acompanhamento</div>
      <div class="brand">
        <div>
          <h1>Status da produção (somente visualização)</h1>
          <p>
            Esta tela é apenas para consulta do andamento dos pedidos.
            Não é possível alterar status por aqui.
          </p>
        </div>
        <div class="toolbar">
          <button class="btn-outline" onclick="voltar()">Voltar</button>
          <button class="btn-primary" id="btnRecarregar" onclick="carregarPedidosProducao()">Recarregar</button>
        </div>
      </div>
      <div id="statusGlobal" class="status"></div>
    </section>

    <section class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pedido</th>
              <th>Cliente</th>
              <th>LojaID</th>
              <th>Total</th>
              <th>Pago</th>
              <th>Status atual</th>
            </tr>
          </thead>
          <tbody id="tbodyPedidos">
            <tr>
              <td colspan="6" class="empty">Carregando pedidos...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "https://colorglass.onrender.com";
    const STATUS_PRODUCAO = [2, 3, 4, 5];

    function getToken() {
      return localStorage.getItem("USER_TOKEN") || localStorage.getItem("ADMIN_TOKEN") || "";
    }

    function setStatusGlobal(msg, tipo = "") {
      const el = document.getElementById("statusGlobal");
      el.textContent = msg;
      el.className = "status " + tipo;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function moneyBR(valor) {
      const n = Number(valor || 0);
      return n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    function parseValorTotal(valor) {
      if (valor === null || valor === undefined) return 0;
      if (typeof valor === "number") return valor;
      const bruto = String(valor).trim();
      if (!bruto) return 0;
      let normalizado = bruto.replace(/[^0-9,.-]/g, "");
      if (normalizado.includes(",")) {
        normalizado = normalizado.replace(/\./g, "").replace(",", ".");
      } else {
        normalizado = normalizado.replace(/,/g, "");
      }
      const parsed = Number(normalizado);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function getUsuarioStoreID(usuario) {
      return String(
        usuario?.storeID
        ?? usuario?.storeid
        ?? usuario?.StoreID
        ?? usuario?.store_id
        ?? usuario?.lojaid
        ?? usuario?.lojaID
        ?? ""
      ).trim();
    }

    function getUsuarioNome(usuario) {
      return String(
        usuario?.NOME
        ?? usuario?.nome
        ?? usuario?.name
        ?? usuario?.dados?.nome
        ?? ""
      ).trim();
    }

    function getPedidoLojaID(pedido) {
      return String(
        pedido?.lojaid
        ?? pedido?.lojaID
        ?? pedido?.storeID
        ?? pedido?.storeid
        ?? ""
      ).trim();
    }

    function criarMapaLojas(usuarios) {
      const mapa = new Map();
      usuarios.forEach((usuario) => {
        const storeID = getUsuarioStoreID(usuario);
        const nome = getUsuarioNome(usuario);
        if (storeID && nome && !mapa.has(storeID)) {
          mapa.set(storeID, nome);
        }
      });
      return mapa;
    }

    function formatarLoja(pedido, lojasPorStoreID) {
      const lojaID = getPedidoLojaID(pedido);
      if (!lojaID) return "-";

      const nomeLoja = lojasPorStoreID.get(lojaID);
      if (!nomeLoja) {
        return `<span class="muted">${escapeHtml(lojaID)}</span>`;
      }

      return `
        <strong>${escapeHtml(nomeLoja)}</strong>
        <div class="muted" style="font-size:0.78rem; margin-top:2px;">LojaID: ${escapeHtml(lojaID)}</div>
      `;
    }

    function renderTabela(pedidos, lojasPorStoreID = new Map()) {
      const tbody = document.getElementById("tbodyPedidos");
      if (!pedidos.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Nenhum pedido encontrado.</td></tr>';
        return;
      }

      tbody.innerHTML = pedidos.map((p) => {
        const valor = parseValorTotal(p.valor_total ?? p.total ?? p.preco_total);
        const valorPago = parseValorTotal(p.valor_pago);
        return `
          <tr>
            <td><b>#${escapeHtml(p.numero_pedido ?? "-")}</b></td>
            <td>${escapeHtml(p.cliente_nome || "-")}</td>
            <td>${formatarLoja(p, lojasPorStoreID)}</td>
            <td>${moneyBR(valor)}</td>
            <td>${moneyBR(valorPago)}</td>
            <td><span class="tag">${escapeHtml(Number(p.status))} - ${escapeHtml(p.status_label || "Status")}</span></td>
          </tr>
        `;
      }).join("");
    }

    async function carregarMapaLojas(token) {
      const res = await fetch(`${API_BASE}/api/usuarios`, {
        headers: token ? { "Authorization": `Bearer ${token}` } : {}
      });

      const data = await res.json();
      if (!res.ok || !Array.isArray(data?.usuarios)) {
        throw new Error(data?.error || "Falha ao carregar lojas.");
      }

      return criarMapaLojas(data.usuarios);
    }

    async function carregarPedidosProducao() {
      const token = getToken();
      const btn = document.getElementById("btnRecarregar");
      const tbody = document.getElementById("tbodyPedidos");

      if (!token) {
        setStatusGlobal("Sessão não encontrada. Faça login novamente.", "erro");
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Token ausente para consulta.</td></tr>';
        return;
      }

      btn.disabled = true;
      setStatusGlobal("Buscando status da produção...");

      try {
        const [res, lojasPorStoreID] = await Promise.all([
          fetch(`${API_BASE}/api/financeiro?status=2,3,4,5&limit=2000`, {
            headers: { "Authorization": `Bearer ${token}` }
          }),
          carregarMapaLojas(token)
        ]);

        const data = await res.json();
        if (!res.ok || !Array.isArray(data)) {
          throw new Error(data?.error || "Falha ao carregar pedidos.");
        }

        const emProducao = data.filter(o => STATUS_PRODUCAO.includes(Number(o.status)));
        renderTabela(emProducao, lojasPorStoreID);
        setStatusGlobal(`Foram encontrados ${emProducao.length} pedido(s).`, "ok");
      } catch (err) {
        console.error(err);
        setStatusGlobal(err.message || "Erro ao buscar pedidos.", "erro");
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Não foi possível carregar os pedidos.</td></tr>';
      } finally {
        btn.disabled = false;
      }
    }

    function voltar() {
      history.back();
    }

    carregarPedidosProducao();
  </script>
</body>
</html>
