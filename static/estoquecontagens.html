<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contagens de Estoque</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }

    header {
      padding: 32px 20px;
      text-align: center;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      color: #ffffff;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
    }

    header p {
      margin: 0;
      opacity: 0.9;
    }

    main {
      width: min(1100px, calc(100% - 32px));
      margin: 32px auto;
      display: grid;
      gap: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }

    .card h2 {
      margin: 0 0 18px;
      color: #0f766e;
      font-size: 1.35rem;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 7px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    input,
    select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1rem;
      color: #111827;
      background: #ffffff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    select:disabled,
    input:read-only {
      background: #f8fafc;
      color: #64748b;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #14b8a6;
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.16);
    }

    .full-width {
      grid-column: 1 / -1;
    }

    .actions {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      background: #0f766e;
      transition: transform 0.2s, background 0.2s;
    }

    button:hover:not(:disabled) {
      background: #115e59;
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .secondary {
      background: #334155;
    }

    .secondary:hover:not(:disabled) {
      background: #1e293b;
    }

    .message {
      min-height: 24px;
      font-weight: 700;
    }

    .message.success {
      color: #15803d;
    }

    .message.error {
      color: #b91c1c;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .list-header h2 {
      margin: 0;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    th,
    td {
      padding: 13px 14px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: top;
    }

    th {
      background: #f8fafc;
      color: #475569;
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .empty {
      padding: 18px;
      text-align: center;
      color: #64748b;
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 20px, 1100px);
        margin: 20px auto;
      }

      .card {
        padding: 18px;
      }

      form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Contagens de Estoque</h1>
    <p>Cadastre e acompanhe as últimas contagens salvas no Supabase.</p>
  </header>

  <main>
    <section class="card" aria-labelledby="form-title">
      <h2 id="form-title">Nova contagem</h2>

      <form id="contagemForm">
        <label>
          Produto
          <select id="produto" name="produto" required disabled>
            <option value="">Carregando produtos cadastrados...</option>
          </select>
        </label>

        <label>
          Quantidade
          <input id="quantidade" name="quantidade" type="number" step="0.01" min="0" placeholder="Ex: 12" required />
        </label>

        <label>
          Unidade
          <input id="unidade" name="unidade" type="text" placeholder="Ex: un, m, kg" required />
        </label>

        <label>
          Custo
          <input id="custo" name="custo" type="number" step="0.01" min="0" placeholder="Ex: 45.90" required />
        </label>

        <label>
          Categoria
          <input id="categoria" name="categoria" type="text" placeholder="Selecione um produto" readonly required />
        </label>

        <label>
          Data da contagem <span style="font-weight: 400; color: #64748b;">(opcional)</span>
          <input id="data_contagem" name="data_contagem" type="datetime-local" />
        </label>

        <div class="actions">
          <button id="salvarBtn" type="submit">Salvar contagem</button>
          <span id="mensagem" class="message" role="status" aria-live="polite"></span>
        </div>
      </form>
    </section>

    <section class="card" aria-labelledby="lista-title">
      <div class="list-header">
        <h2 id="lista-title">Últimas contagens cadastradas</h2>
        <button id="recarregarBtn" class="secondary" type="button">Recarregar lista</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Produto</th>
              <th>Quantidade</th>
              <th>Unidade</th>
              <th>Custo</th>
              <th>Categoria</th>
              <th>Data da contagem</th>
            </tr>
          </thead>
          <tbody id="contagensBody">
            <tr>
              <td colspan="7" class="empty">Carregando contagens...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://hfhwvzldhgqniqnurync.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_0j-jqB63odD2yvugj7olMA_s18OwuPl";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const form = document.getElementById("contagemForm");
    const mensagem = document.getElementById("mensagem");
    const produtoSelect = document.getElementById("produto");
    const categoriaInput = document.getElementById("categoria");
    const custoInput = document.getElementById("custo");
    const salvarBtn = document.getElementById("salvarBtn");
    const recarregarBtn = document.getElementById("recarregarBtn");
    const contagensBody = document.getElementById("contagensBody");
    const tabelasProdutos = [
      { tabela: "perfis", categoria: "perfis", campoNome: "nome", select: "id, nome, custo" },
      { tabela: "vidros", categoria: "vidros", campoNome: "tipo", select: "id, tipo, espessura, custo" },
      { tabela: "puxadores", categoria: "puxadores", campoNome: "nome", select: "id, nome, custo" },
      { tabela: "sistemas", categoria: "sistemas", campoNome: "nome", select: "id, nome, custo" },
      { tabela: "trilhos", categoria: "trilhos", campoNome: "nome", select: "id, nome, custo" }
    ];
    const produtosPorChave = new Map();

    function mostrarMensagem(texto, tipo) {
      mensagem.textContent = texto;
      mensagem.className = `message ${tipo || ""}`.trim();
    }

    function valorDecimal(campo) {
      const valor = form.elements[campo].value;
      return valor === "" ? null : Number(valor);
    }

    function textoProduto(item, config) {
      if (config.tabela === "vidros") {
        const tipo = String(item.tipo || "").trim();
        const espessura = item.espessura ? `${item.espessura} mm` : "";
        return [tipo, espessura].filter(Boolean).join(" - ");
      }

      return String(item[config.campoNome] || "").trim();
    }

    function limparSelectProdutos(texto) {
      produtoSelect.innerHTML = "";
      const option = document.createElement("option");
      option.value = "";
      option.textContent = texto;
      produtoSelect.appendChild(option);
    }

    function criarOpcaoProduto(item, config) {
      const nome = textoProduto(item, config);
      if (!nome) return null;

      const chave = `${config.categoria}:${item.id ?? nome}`;
      const option = document.createElement("option");
      option.value = chave;
      option.textContent = nome;
      option.dataset.categoria = config.categoria;

      produtosPorChave.set(chave, {
        nome,
        categoria: config.categoria,
        custo: item.custo
      });

      return option;
    }

    async function carregarProdutosCadastrados() {
      produtoSelect.disabled = true;
      salvarBtn.disabled = true;
      categoriaInput.value = "";
      produtosPorChave.clear();
      limparSelectProdutos("Carregando produtos cadastrados...");

      const resultados = await Promise.allSettled(
        tabelasProdutos.map(async (config) => {
          const { data, error } = await supabase
            .from(config.tabela)
            .select(config.select)
            .order(config.campoNome, { ascending: true });

          if (error) throw new Error(`${config.categoria}: ${error.message}`);
          return { config, data: data || [] };
        })
      );

      produtoSelect.innerHTML = "";
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Selecione um produto cadastrado";
      produtoSelect.appendChild(placeholder);

      const erros = [];

      resultados.forEach((resultado) => {
        if (resultado.status === "rejected") {
          erros.push(resultado.reason.message);
          return;
        }

        const { config, data } = resultado.value;
        const opcoes = data
          .map((item) => criarOpcaoProduto(item, config))
          .filter(Boolean);

        if (!opcoes.length) return;

        const grupo = document.createElement("optgroup");
        grupo.label = config.categoria;
        opcoes.forEach((option) => grupo.appendChild(option));
        produtoSelect.appendChild(grupo);
      });

      produtoSelect.disabled = produtosPorChave.size === 0;
      salvarBtn.disabled = produtosPorChave.size === 0;

      if (produtosPorChave.size === 0) {
        limparSelectProdutos("Nenhum produto cadastrado encontrado");
      }

      if (erros.length) {
        mostrarMensagem(`Algumas categorias não carregaram: ${erros.join(" | ")}`, "error");
      }
    }

    function atualizarProdutoSelecionado() {
      const produto = produtosPorChave.get(produtoSelect.value);
      categoriaInput.value = produto?.categoria || "";

      if (produto?.custo !== null && produto?.custo !== undefined && produto.custo !== "") {
        custoInput.value = produto.custo;
      }
    }

    function formatarNumero(valor) {
      if (valor === null || valor === undefined || valor === "") return "—";
      return Number(valor).toLocaleString("pt-BR", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      });
    }

    function formatarMoeda(valor) {
      if (valor === null || valor === undefined || valor === "") return "—";
      return Number(valor).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatarData(valor) {
      if (!valor) return "—";
      return new Date(valor).toLocaleString("pt-BR", {
        dateStyle: "short",
        timeStyle: "short"
      });
    }

    function criarCelula(texto) {
      const td = document.createElement("td");
      td.textContent = texto;
      return td;
    }

    function renderizarLinhaMensagem(texto) {
      contagensBody.innerHTML = "";
      const tr = document.createElement("tr");
      const td = criarCelula(texto);
      td.colSpan = 7;
      td.className = "empty";
      tr.appendChild(td);
      contagensBody.appendChild(tr);
    }

    function renderizarContagens(contagens) {
      contagensBody.innerHTML = "";

      if (!contagens.length) {
        renderizarLinhaMensagem("Nenhuma contagem cadastrada ainda.");
        return;
      }

      contagens.forEach((contagem) => {
        const tr = document.createElement("tr");
        tr.appendChild(criarCelula(contagem.id ?? "—"));
        tr.appendChild(criarCelula(contagem.produto || "—"));
        tr.appendChild(criarCelula(formatarNumero(contagem.quantidade)));
        tr.appendChild(criarCelula(contagem.unidade || "—"));
        tr.appendChild(criarCelula(formatarMoeda(contagem.custo)));
        tr.appendChild(criarCelula(contagem.categoria || "—"));
        tr.appendChild(criarCelula(formatarData(contagem.data_contagem)));
        contagensBody.appendChild(tr);
      });
    }

    async function carregarContagens() {
      recarregarBtn.disabled = true;
      renderizarLinhaMensagem("Carregando contagens...");

      const { data, error } = await supabase
        .from("estoque_contagens")
        .select("id, produto, quantidade, unidade, data_contagem, custo, categoria")
        .order("data_contagem", { ascending: false })
        .order("id", { ascending: false })
        .limit(20);

      recarregarBtn.disabled = false;

      if (error) {
        renderizarLinhaMensagem(`Erro ao carregar contagens: ${error.message}`);
        return;
      }

      renderizarContagens(data || []);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      mostrarMensagem("Salvando contagem...", "");
      salvarBtn.disabled = true;

      const dataContagem = form.elements.data_contagem.value;
      const novaContagem = {
        produto: produtosPorChave.get(produtoSelect.value)?.nome || "",
        quantidade: valorDecimal("quantidade"),
        unidade: form.elements.unidade.value.trim(),
        custo: valorDecimal("custo"),
        categoria: categoriaInput.value
      };

      if (!novaContagem.produto || !novaContagem.categoria) {
        salvarBtn.disabled = false;
        mostrarMensagem("Selecione um produto cadastrado antes de salvar.", "error");
        return;
      }

      if (dataContagem) {
        novaContagem.data_contagem = new Date(dataContagem).toISOString();
      }

      const { error } = await supabase
        .from("estoque_contagens")
        .insert([novaContagem]);

      salvarBtn.disabled = false;

      if (error) {
        mostrarMensagem(`Erro ao salvar: ${error.message}`, "error");
        return;
      }

      form.reset();
      categoriaInput.value = "";
      mostrarMensagem("Contagem salva com sucesso!", "success");
      carregarContagens();
    });

    produtoSelect.addEventListener("change", atualizarProdutoSelecionado);
    recarregarBtn.addEventListener("click", carregarContagens);
    carregarProdutosCadastrados();
    carregarContagens();
  </script>
</body>
</html>
