<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfis de Alumínio | ColorGlass</title>
<meta name="description" content="Gestão de perfis de alumínio da ColorGlass.">
<style>
* { box-sizing: border-box; margin:0; padding:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #f5f7fa; color: #333; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
header { margin-bottom: 20px; }
h1 { color: #1079ba; margin-bottom: 10px; }
.menu { display: flex; justify-content: flex-start; gap: 10px; margin-bottom: 20px; }
.menu button { padding: 10px 16px; background: #1079ba; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
.menu button:hover { background: #0d5d8c; transform: translateY(-2px); }
.form-perfil { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); margin-bottom: 30px; }
.form-perfil input, .form-perfil select { padding: 6px 10px; font-size: 0.95rem; border-radius: 8px; border: 1px solid #ccc; width: 100%; transition: all 0.2s ease; }
.form-perfil input:focus, .form-perfil select:focus { border-color: #1079ba; box-shadow: 0 0 4px rgba(16,121,186,0.4); outline: none; }
.preco-preview { display: flex; align-items: center; justify-content: center; background: #eef4fb; border-radius: 8px; padding: 8px 12px; font-weight: 600; color: #0d5d8c; }
.form-perfil button { padding: 6px 12px; font-size: 0.95rem; border-radius: 8px; border: none; background: #1079ba; color: #fff; cursor: pointer; transition: all 0.2s ease; }
.form-perfil button:hover { background: #0d5d8c; transform: translateY(-1px); }
.form-perfil .tipologias-container, .form-perfil .insumos-container, .form-perfil .puxadores-container { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
.tipologias, .puxadores-lista { display: flex; flex-wrap: wrap; gap: 10px; }
.tipologias label, .insumo-item, .puxador-item { background: #f0f4fb; padding: 6px 10px; border-radius: 8px; display: flex; align-items: center; gap: 6px; font-size: 0.95rem; }
.puxador-item input { width: auto; }
.insumo-item select { width: auto; }
button, .form-perfil button { padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; background: #1079ba; color: #fff; font-weight: 600; transition: all 0.2s ease; }
button:hover, .form-perfil button:hover { background: #0d5d8c; transform: translateY(-2px); }
.btn-danger { background: #e84118; }
.btn-danger:hover { background: #c23616; transform: translateY(-2px); }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
th, td { padding: 12px; text-align: center; border: 1px solid #dcdde1; }
th { background: #1079ba; color: #fff; }
tr:nth-child(even) { background: #f7f9fc; }
tr:hover { background: #e6f0fa; }
@media(max-width: 768px) { .form-perfil { grid-template-columns: 1fr; } .menu { flex-direction: column; } .tipologias, .insumos-container, .puxadores-lista { flex-direction: column; } }
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>Perfis de Alumínio</h1>
        <div class="menu">
            <button onclick="window.location.href='/'">Voltar</button>
            <button onclick="salvar()">Salvar</button>
            <button onclick="cancelar()">Cancelar</button>
        </div>
    </header>

    <section class="form-perfil">
        <input type="hidden" id="perfil_id">
        <input id="nome" placeholder="Nome">
        <input id="custo" type="number" step="0.01" placeholder="Custo">
        <input id="margem" type="number" step="0.01" placeholder="Margem %">
        <input id="perda" type="number" step="0.01" placeholder="Perda %">
        <div class="preco-preview" id="precoPreview">Preço final: R$ 0,00</div>

        <div class="tipologias-container">
            <h4>Tipologias</h4>
            <div class="tipologias">
                <label><input type="checkbox" value="giro"> Giro</label>
                <label><input type="checkbox" value="divisao_ambiente"> Divisão de ambiente</label>
                <label><input type="checkbox" value="deslizante"> Deslizante</label>
                <label><input type="checkbox" value="pivotante"> Pivotante</label>
                <label><input type="checkbox" value="estrutural"> Estrutural</label>
                <label><input type="checkbox" value="prateleiras"> Prateleiras</label>
            </div>
        </div>

        <div class="insumos-container">
            <h4>Insumos</h4>
            <div id="insumos-container">
                <div class="insumo-item">
                    <select class="insumo-select"></select>
                    <button type="button" onclick="adicionarInsumo(this)">+</button>
                </div>
            </div>
        </div>

        <div class="puxadores-container">
            <h4>Puxadores compatíveis com este perfil</h4>
            <div id="puxadores-container" class="puxadores-lista"></div>
        </div>
    </section>

    <section>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Custo</th>
                    <th>Margem</th>
                    <th>Perda</th>
                    <th>Preço Final</th>
                    <th>Tipologias</th>
                    <th>Insumos</th>
                    <th>Puxadores</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </section>
</div>
<script>
const BASE_URL = "https://colorglass.onrender.com";
const TIPO_ANTIGO = "correr";
const TIPO_NOVO = "divisao_ambiente";
const LABEL_NOVO = "Divisão de ambiente";
window.__perfilEditarData = [];

function normalizarTipologia(valor) {
    return String(valor || "").trim() === TIPO_ANTIGO ? TIPO_NOVO : String(valor || "").trim();
}

function normalizarTipologias(lista) {
    return (Array.isArray(lista) ? lista : [])
        .map(normalizarTipologia)
        .filter(Boolean)
        .filter((valor, index, array) => array.indexOf(valor) === index);
}

function formatarTipologia(valor) {
    const tipo = normalizarTipologia(valor);
    const mapa = {
        giro: "Giro",
        deslizante: "Deslizante",
        divisao_ambiente: LABEL_NOVO,
        pivotante: "Pivotante",
        estrutural: "Estrutural",
        prateleiras: "Prateleiras"
    };
    return mapa[tipo] || tipo || "-";
}

function formatarTipologias(lista) {
    const texto = normalizarTipologias(lista).map(formatarTipologia).join(", ");
    return texto || "-";
}

function normalizarListaTexto(lista) {
    return (Array.isArray(lista) ? lista : [])
        .map(valor => String(valor || "").trim())
        .filter(Boolean)
        .filter((valor, index, array) => array.indexOf(valor) === index);
}

let insumosLista = [];
let puxadoresLista = [];

async function carregarInsumos() {
    const res = await fetch(`${BASE_URL}/api/materiais`);
    const data = await res.json();
    insumosLista = Array.isArray(data) ? data.map(material => material.nome).filter(Boolean) : [];
    atualizarSelects();
}

async function carregarPuxadores() {
    const res = await fetch(`${BASE_URL}/api/puxadores`);
    const data = await res.json();
    puxadoresLista = Array.isArray(data) ? data : [];
    atualizarPuxadoresCheckboxes();
}

function atualizarSelects() {
    document.querySelectorAll(".insumo-select").forEach(select => {
        const valorAtual = select.value;
        select.innerHTML = "<option value=''>--Selecione--</option>";
        insumosLista.forEach(insumo => {
            const opt = document.createElement("option");
            opt.value = insumo;
            opt.textContent = insumo;
            select.appendChild(opt);
        });
        select.value = valorAtual;
    });
}

function atualizarPuxadoresCheckboxes(selecionados = []) {
    const container = document.getElementById("puxadores-container");
    if (!container) return;

    const selecionadosSet = new Set(normalizarListaTexto(selecionados));
    container.innerHTML = "";

    if (!puxadoresLista.length) {
        container.innerHTML = "<span>Nenhum puxador cadastrado.</span>";
        return;
    }

    puxadoresLista.forEach(puxador => {
        const id = String(puxador.id);
        const label = document.createElement("label");
        label.className = "puxador-item";
        label.innerHTML = `<input type="checkbox" value="${id}"> ${puxador.nome}`;
        const checkbox = label.querySelector("input");
        checkbox.checked = selecionadosSet.has(id) || selecionadosSet.has(String(puxador.nome || ""));
        container.appendChild(label);
    });
}

function adicionarInsumo() {
    const container = document.getElementById("insumos-container");
    const novoItem = document.createElement("div");
    novoItem.className = "insumo-item";
    novoItem.innerHTML = `<select class="insumo-select"></select><button type="button" onclick="adicionarInsumo(this)">+</button><button type="button" onclick="removerInsumo(this)">-</button>`;
    container.appendChild(novoItem);
    atualizarSelects();
}

function removerInsumo(botao) {
    botao.parentElement.remove();
}

function getInsumosSelecionados() {
    return Array.from(document.querySelectorAll(".insumo-select")).map(select => select.value).filter(Boolean);
}

function getPuxadoresSelecionados() {
    return Array.from(document.querySelectorAll("#puxadores-container input:checked")).map(input => input.value).filter(Boolean);
}

function getTipologiasSelecionadas() {
    return normalizarTipologias(Array.from(document.querySelectorAll(".tipologias input:checked")).map(input => input.value));
}

function formatarPuxadores(lista) {
    const ids = normalizarListaTexto(lista);
    if (!ids.length) return "-";

    return ids.map(id => {
        const puxador = puxadoresLista.find(p => String(p.id) === String(id) || String(p.nome) === String(id));
        return puxador?.nome || id;
    }).join(", ");
}

function numeroMoeda(valor) {
    const numero = Number(valor || 0);
    return Number.isFinite(numero) ? numero.toFixed(2) : "0.00";
}

async function carregar() {
    const res = await fetch(`${BASE_URL}/api/perfis`);
    const data = await res.json();
    const lista = Array.isArray(data) ? data : [];
    const tbody = document.getElementById("tabela");
    tbody.innerHTML = "";
    window.__perfilEditarData = [];

    lista.forEach((perfil, index) => {
        const p = {
            ...perfil,
            tipologias: normalizarTipologias(perfil.tipologias),
            puxadores: normalizarListaTexto(perfil.puxadores)
        };
        window.__perfilEditarData[index] = p;

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${p.nome || "-"}</td>
            <td>R$ ${numeroMoeda(p.custo)}</td>
            <td>${p.margem ?? 0}%</td>
            <td>${p.perda ?? 0}%</td>
            <td><b>R$ ${numeroMoeda(p.preco)}</b></td>
            <td>${formatarTipologias(p.tipologias)}</td>
            <td>${(p.insumos || []).join(", ") || "-"}</td>
            <td>${formatarPuxadores(p.puxadores)}</td>
            <td><button onclick="editar(window.__perfilEditarData[${index}])">Editar</button> <button class="btn-danger" onclick="excluir('${p.id}')">Excluir</button></td>
        `;
        tbody.appendChild(tr);
    });
}

const nomeInput = document.getElementById("nome");
const custoInput = document.getElementById("custo");
const margemInput = document.getElementById("margem");
const perdaInput = document.getElementById("perda");
const perfil_id = document.getElementById("perfil_id");
const precoPreview = document.getElementById("precoPreview");

function atualizarPrecoPreview() {
    const custo = parseFloat(custoInput.value) || 0;
    const margem = parseFloat(margemInput.value) || 0;
    const perda = parseFloat(perdaInput.value) || 0;
    const preco = custo * (1 + perda / 100) * (1 + margem / 100);
    precoPreview.textContent = `Preço final: R$ ${preco.toFixed(2)}`;
}

async function salvar() {
    const id = perfil_id.value;
    const nome = nomeInput.value.trim();
    const custo = parseFloat(custoInput.value);
    const margem = parseFloat(margemInput.value);
    const perda = parseFloat(perdaInput.value);
    const tipologias = getTipologiasSelecionadas();
    const insumos = getInsumosSelecionados();
    const puxadores = getPuxadoresSelecionados();

    if (!nome || isNaN(custo) || isNaN(margem) || isNaN(perda) || tipologias.length === 0) {
        alert("Preencha todos os campos e selecione ao menos uma tipologia");
        return;
    }

    const payload = { nome, custo, margem, perda, tipologias, insumos, puxadores };
    const url = id ? `${BASE_URL}/api/perfis/${id}` : `${BASE_URL}/api/perfis`;
    const method = id ? "PUT" : "POST";

    await fetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    cancelar();
    carregar();
}

function editar(p) {
    if (!p) return;
    p.tipologias = normalizarTipologias(p.tipologias);
    p.puxadores = normalizarListaTexto(p.puxadores);

    perfil_id.value = p.id;
    nomeInput.value = p.nome || "";
    custoInput.value = p.custo ?? "";
    margemInput.value = p.margem ?? "";
    perdaInput.value = p.perda ?? "";
    atualizarPrecoPreview();

    document.querySelectorAll(".tipologias input").forEach(input => {
        input.checked = p.tipologias.includes(normalizarTipologia(input.value));
    });

    const container = document.getElementById("insumos-container");
    container.innerHTML = "";
    (p.insumos?.length ? p.insumos : [""]).forEach(() => {
        const div = document.createElement("div");
        div.className = "insumo-item";
        div.innerHTML = `<select class="insumo-select"></select><button type="button" onclick="adicionarInsumo(this)">+</button><button type="button" onclick="removerInsumo(this)">-</button>`;
        container.appendChild(div);
    });

    atualizarSelects();
    document.querySelectorAll(".insumo-select").forEach((select, index) => {
        select.value = p.insumos?.[index] || "";
    });
    atualizarPuxadoresCheckboxes(p.puxadores);
}

async function excluir(id) {
    if (!confirm("Excluir este perfil?")) return;
    await fetch(`${BASE_URL}/api/perfis/${id}`, { method: "DELETE" });
    carregar();
}

function cancelar() {
    perfil_id.value = "";
    nomeInput.value = "";
    custoInput.value = "";
    margemInput.value = "";
    perdaInput.value = "";
    atualizarPrecoPreview();
    document.querySelectorAll(".tipologias input").forEach(input => input.checked = false);
    document.getElementById("insumos-container").innerHTML = `<div class="insumo-item"><select class="insumo-select"></select><button type="button" onclick="adicionarInsumo(this)">+</button></div>`;
    atualizarSelects();
    atualizarPuxadoresCheckboxes();
}

window.addEventListener("DOMContentLoaded", async () => {
    ["input", "change"].forEach(eventType => {
        custoInput.addEventListener(eventType, atualizarPrecoPreview);
        margemInput.addEventListener(eventType, atualizarPrecoPreview);
        perdaInput.addEventListener(eventType, atualizarPrecoPreview);
    });

    atualizarPrecoPreview();
    await Promise.all([carregarInsumos(), carregarPuxadores()]);
    await carregar();
});
</script>
</body>
</html>
