<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logística | ColorGlass</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root{--cg-blue:#1079ba;--cg-blue-dark:#0d5d8c;--cg-soft:#e7f3fb;--border:rgba(16,121,186,.14);--text:#1f2933;--muted:#6b7280;--ok:#0c7c3c;--err:#c23616}
    *{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif}
    body{min-height:100vh;background:radial-gradient(circle at top,rgba(16,121,186,.15),transparent 55%),linear-gradient(135deg,#f5fbff 0%,#eef4f9 45%,#f8fbff 100%);color:var(--text);padding:28px 16px}
    .page{width:min(1080px,100%);margin:0 auto;display:flex;flex-direction:column;gap:18px}
    .card{background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 12px 30px rgba(15,44,62,.12);padding:22px}
    .header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
    .logo{display:flex;align-items:center;gap:14px}.logo img{width:52px;height:52px;border-radius:14px;object-fit:contain;box-shadow:0 8px 18px rgba(16,121,186,.28)}
    h1{font-size:1.5rem;color:var(--cg-blue-dark)}p{color:#4b5563;line-height:1.45}.muted{color:var(--muted);font-size:.92rem}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}@media(max-width:760px){.grid{grid-template-columns:1fr}}
    .btn{display:flex;align-items:center;justify-content:center;text-align:center;min-height:76px;border-radius:16px;padding:18px;text-decoration:none;font-weight:800;background:linear-gradient(135deg,var(--cg-blue),var(--cg-blue-dark));color:#fff;box-shadow:0 10px 18px rgba(16,121,186,.24)}
    .btn.secondary{background:#fff;color:var(--cg-blue-dark);border:1px solid rgba(16,121,186,.25);box-shadow:none}.btn:hover{transform:translateY(-1px)}
    .stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}@media(max-width:900px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:520px){.stats{grid-template-columns:1fr}}
    .stat{border:1px solid rgba(16,121,186,.12);border-radius:14px;padding:14px;background:rgba(231,243,251,.35)}.stat span{display:block;color:var(--muted);font-size:.86rem}.stat strong{display:block;margin-top:6px;font-size:1.35rem;color:var(--cg-blue-dark)}
    .status{margin-top:10px;font-size:.92rem;color:#555;min-height:20px}.status.ok{color:var(--ok)}.status.erro{color:var(--err)}
    table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:10px;border-bottom:1px solid rgba(16,121,186,.08);text-align:left}th{font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;color:var(--cg-blue-dark);background:rgba(231,243,251,.55)}.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:14px;margin-top:12px}
    .tag{display:inline-flex;padding:4px 8px;border-radius:999px;background:rgba(16,121,186,.12);color:var(--cg-blue-dark);font-size:.78rem;font-weight:800}
  </style>
</head>
<body>
<main class="page">
  <section class="card header">
    <div class="logo">
      <img src="https://hfhwvzldhgqniqnurync.supabase.co/storage/v1/object/public/teste/logo.jpg" alt="ColorGlass">
      <div>
        <h1>Painel de Logística</h1>
        <p>Diogo — acesso operacional restrito a controle, pagamentos e resumo geral dos pedidos.</p>
      </div>
    </div>
    <button class="btn secondary" style="min-height:auto;cursor:pointer" onclick="sair()">Sair</button>
  </section>

  <section class="grid">
    <a class="btn" href="/controle.html">Controle de pedidos</a>
    <a class="btn secondary" href="/pagamentos.html">Pagamentos</a>
  </section>

  <section class="card">
    <h1>Resumo dos pedidos</h1>
    <p class="muted">Resumo operacional de todos os pedidos em andamento.</p>
    <div id="status" class="status"></div>
    <div class="stats" id="stats"></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Pedido</th><th>Cliente</th><th>Status</th><th>Valor</th><th>LojaID</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="5" class="muted">Carregando...</td></tr></tbody>
      </table>
    </div>
  </section>
</main>
<script>
const API_BASE="https://colorglass.onrender.com";
const STATUS={0:"Cancelado",1:"Orçamento",2:"Aprovado",3:"Em Produção",4:"Separado",5:"Entregue"};
function getToken(){return localStorage.getItem("USER_TOKEN")||localStorage.getItem("ADMIN_TOKEN")||""}
function headers(){const t=getToken();return t?{Authorization:`Bearer ${t}`}:{}}
function money(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function loja(o){return String(o?.lojaid??o?.storeid??"").trim()}
function statusLabel(s){const n=Number(s);return STATUS[n]||String(s??"-")}
function setStatus(msg,tipo=""){const el=document.getElementById("status");el.textContent=msg;el.className="status "+tipo}
function sair(){localStorage.removeItem("USER_TOKEN");localStorage.removeItem("ADMIN_TOKEN");localStorage.removeItem("USER_LEVEL");localStorage.removeItem("USER_STOREID");location.href="/login.html"}
async function carregar(){
  const token=getToken();
  if(!token){location.href="/login.html";return}
  try{
    setStatus("Carregando resumo...");
    const res=await fetch(`${API_BASE}/api/financeiro?status=1,2,3,4,5&limit=2000`,{headers:headers()});
    const data=await res.json();
    if(!res.ok||!Array.isArray(data))throw new Error(data?.error||"Falha ao carregar pedidos.");
    const cont={total:data.length,orcamento:0,aprovado:0,producao:0,separado:0,entregue:0};
    data.forEach(o=>{const s=Number(o.status);if(s===1)cont.orcamento++;if(s===2)cont.aprovado++;if(s===3)cont.producao++;if(s===4)cont.separado++;if(s===5)cont.entregue++});
    document.getElementById("stats").innerHTML=`
      <div class="stat"><span>Total</span><strong>${cont.total}</strong></div>
      <div class="stat"><span>Aprovados</span><strong>${cont.aprovado}</strong></div>
      <div class="stat"><span>Em produção</span><strong>${cont.producao}</strong></div>
      <div class="stat"><span>Separados</span><strong>${cont.separado}</strong></div>
      <div class="stat"><span>Entregues</span><strong>${cont.entregue}</strong></div>`;
    document.getElementById("tbody").innerHTML=data.slice(0,80).map(o=>`<tr><td><b>#${o.numero_pedido??"-"}</b></td><td>${o.cliente_nome||"-"}</td><td><span class="tag">${statusLabel(o.status)}</span></td><td>${money(o.valor_total)}</td><td>${loja(o)||"-"}</td></tr>`).join("")||'<tr><td colspan="5" class="muted">Nenhum pedido encontrado.</td></tr>';
    setStatus("Resumo carregado.","ok");
  }catch(err){setStatus(err.message||"Erro ao carregar resumo.","erro")}
}
carregar();
</script>
</body>
</html>
