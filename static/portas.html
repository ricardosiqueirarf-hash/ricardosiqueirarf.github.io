<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portas de Vidro e Alumínio em Fortaleza | ColorGlass</title>
<meta name="description" content="Portas de vidro e alumínio sob medida em Fortaleza. Orçamento rápido, qualidade premium e instalação profissional.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://www.colorglassfortaleza.com.br/">
<link id="tema-css" rel="stylesheet" href="">
<style>
:root{--cg-blue:#1079ba;--cg-blue-dark:#0d5d8c;--cg-blue-soft:#e7f3fb;--cg-white:#fff;--cg-text:#1f2933;--cg-muted:#6b7280;--cg-border:rgba(16,121,186,.12);--cg-shadow:0 12px 30px rgba(15,44,62,.12);--cg-shadow-soft:0 10px 24px rgba(15,44,62,.10)}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
body{background:radial-gradient(circle at top,rgba(16,121,186,.15),transparent 55%),linear-gradient(135deg,#f5fbff 0%,#eef4f9 45%,#f8fbff 100%);color:var(--cg-text);min-height:100vh}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;gap:18px;padding:18px;animation:fadeIn .75s ease}.sidebar{background:linear-gradient(135deg,var(--cg-blue),var(--cg-blue-dark));color:#fff;padding:22px 18px;display:flex;flex-direction:column;gap:12px;border-radius:18px;box-shadow:var(--cg-shadow);position:sticky;top:18px;height:calc(100vh - 36px);overflow:hidden}.sidebar h3{margin-bottom:8px;font-size:1.25rem;letter-spacing:.6px;position:relative;z-index:1}.sidebar button{padding:12px;border:1px solid rgba(255,255,255,.18);border-radius:12px;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;text-align:left;font-weight:700;transition:.2s ease;position:relative;z-index:1}.sidebar button:hover{background:rgba(255,255,255,.22);transform:translateX(4px)}
.content{padding:22px;overflow-y:auto;border-radius:18px;background:rgba(255,255,255,.55);border:1px solid rgba(16,121,186,.10);box-shadow:var(--cg-shadow-soft);backdrop-filter:blur(10px)}.content h1{color:var(--cg-blue-dark);margin-bottom:10px;font-size:1.65rem}.content h2{color:var(--cg-blue);margin-bottom:10px;font-size:1.15rem}#infoOrcamento{background:var(--cg-white);border:1px solid var(--cg-border);box-shadow:var(--cg-shadow-soft);border-radius:16px;padding:14px 16px;margin-bottom:14px;min-height:10px}
.door-layout{display:grid;grid-template-columns:minmax(280px,460px) 1fr;gap:18px;align-items:start;margin-top:10px}.door-form,.door-preview,.section-card{background:var(--cg-white);border-radius:18px;border:1px solid var(--cg-border);box-shadow:var(--cg-shadow);position:relative;overflow:hidden}.door-form{display:flex;flex-direction:column;gap:12px;padding:18px}.door-preview{padding:12px}.section-card{padding:16px;margin-top:18px}label{display:flex;flex-direction:column;font-size:.92rem;gap:7px;color:#374151}input,select,textarea{padding:12px 14px;font-size:.95rem;border-radius:12px;border:1px solid #d4d9df;width:100%;background:#fdfefe;transition:.2s ease}input:focus,select:focus,textarea:focus{border-color:var(--cg-blue);box-shadow:0 0 0 3px rgba(16,121,186,.15);outline:none}.required-empty{background:#fdeaea!important;border-color:#f1b0b0!important}.required-filled{background:#e9f8ee!important;border-color:#9fd4b1!important}.btn{padding:12px 16px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,var(--cg-blue),var(--cg-blue-dark));color:#fff;font-weight:800;transition:.2s ease;box-shadow:0 10px 18px rgba(16,121,186,.22)}.btn:hover{transform:translateY(-2px);box-shadow:0 14px 24px rgba(16,121,186,.26)}.btn-danger{background:linear-gradient(135deg,#e84118,#c23616)}#portaSVG{width:100%;height:400px;border:1px solid rgba(16,121,186,.18);background:rgba(255,255,255,.95);border-radius:14px}.price-preview{background:linear-gradient(135deg,rgba(16,121,186,.10),rgba(13,93,140,.04));color:var(--cg-blue-dark);font-weight:800;padding:10px 12px;border-radius:14px;border:1px solid rgba(16,121,186,.14)}#portasSalvas div,#printResumo .print-item,#printOrdem .print-item{margin-bottom:12px;border:1px solid rgba(16,121,186,.14);padding:12px;background:rgba(255,255,255,.95);border-radius:14px;box-shadow:0 10px 18px rgba(15,44,62,.08)}.helper-text{color:var(--cg-muted);font-size:.85rem}.document-actions{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:14px;margin-top:14px}.action-group{border:1px solid rgba(16,121,186,.14);background:linear-gradient(180deg,#fff,#f7fbff);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:10px}.action-group-title{font-size:.78rem;font-weight:950;color:var(--cg-blue-dark);text-transform:uppercase;letter-spacing:.08em}.action-buttons{display:flex;gap:10px;flex-wrap:wrap}.action-buttons .btn{flex:1;min-width:180px;text-align:center}.print-area{display:none}.print-area.active{display:block}.thermal-area{display:none}.thermal-area.active{display:block}#printResumo svg{display:none}.op-svg{border:1px solid rgba(16,121,186,.14);border-radius:14px;background:#fff;width:100%;height:auto;margin-top:10px}.op-page{display:grid;grid-template-columns:2fr 1fr;gap:20px;align-items:center;margin:0 auto 24px;width:210mm;min-height:280mm;box-sizing:border-box;padding:10mm}.op-content{display:grid;grid-template-columns:2fr 1fr;gap:20px;align-items:center}.op-svg-wrap{min-width:0}.op-info{font-size:15px;line-height:1.45}.op-info-row{display:grid;grid-template-columns:minmax(120px,40%) 1fr;gap:8px;align-items:start;margin-bottom:8px}.op-info-row span{font-weight:700;color:#1f2933}.op-info-row strong{font-weight:500;color:#1f2933;white-space:normal;overflow-wrap:anywhere;word-break:break-word}.op-measure{font-size:20px;fill:#333}.thermal-label{page:etiquetaTermica;width:4in;height:6in;padding:.24in;border:1px solid #333;box-sizing:border-box;font-size:12px;display:flex;flex-direction:column;justify-content:space-between;gap:6px;background:#fff;color:#111}.thermal-header,.thermal-header strong,.thermal-body,.thermal-footer{font-size:20px;line-height:1.4}.thermal-divider{border-top:1px solid #333;margin:4px 0}
@media print{@page{size:A4 portrait;margin:0}@page etiquetaTermica{size:4in 6in;margin:0}body{background:#fff}.sidebar,.door-form,.door-preview,.section-card,.btn{display:none!important}.print-area.active,.thermal-area.active{display:block}.content{padding:0;box-shadow:none;border:none;background:#fff}#printOrdem .print-item{border:0!important;border-radius:0!important;box-shadow:none!important;margin:0!important;background:#fff!important;transform:none!important}.op-page{width:210mm;min-height:280mm;margin:0 auto!important;padding:10mm;gap:12mm;break-inside:avoid;page-break-after:always;break-after:page}.op-content{grid-template-columns:2fr 1fr;gap:12mm}.op-info{font-size:13px;line-height:1.35}.op-info-row{grid-template-columns:minmax(35mm,42mm) 1fr;gap:3mm;margin-bottom:2.5mm}.thermal-label{page:etiquetaTermica;width:4in!important;height:6in!important;padding:.24in!important;page-break-after:always;break-after:page;border:none!important}#printResumo svg{display:none!important}}
@media(max-width:1024px){.app{grid-template-columns:1fr}.sidebar{position:relative;top:0;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:space-between}.sidebar button{text-align:center;flex:1}.door-layout{grid-template-columns:1fr}.document-actions{grid-template-columns:1fr}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
<script src="main.js?v=portas-nan-svg-fix-1" defer></script>
<script src="api.js?v=portas-content-type-fix-1" defer></script>
<script src="pricing.js" defer></script>
<script src="ui.js" defer></script>
<script src="print.js" defer></script>
<script src="validation.js" defer></script>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <h3>ColorGlass</h3>
        <button onclick="go('index_loja.html')">Voltar</button>
    </div>

    <div class="content">
        <div id="infoOrcamento"></div>

        <div class="door-layout">
            <div class="door-form">
                <label>Tipologia
                    <select id="tipologia" onchange="renderCampos()">
                        <option value="">Selecione</option>
                        <option value="giro">Giro</option>
                        <option value="deslizante">Deslizante</option>
                        <option value="correr">Correr</option>
                        <option value="pivotante">Pivotante</option>
                    </select>
                </label>
                <label>Quantidade
                    <input type="number" id="quantidade" value="1" min="1" data-required="true" onchange="atualizarPrecoPorta(); atualizarCamposObrigatorios()">
                </label>

                <div id="campos"></div>
                <div class="price-preview" id="precoPorta">Preço estimado: R$ 0,00</div>
                <button class="btn" onclick="salvarPorta()">Salvar Porta</button>
            </div>

            <div class="door-preview">
                <svg id="portaSVG"></svg>
            </div>
        </div>

        <div class="section-card">
            <h2>Portas Salvas</h2>
            <div id="portasSalvas"></div>
        </div>

        <div class="section-card" id="orcamentoAuditoriaCard">
            <h2>Verificação do Orçamento</h2>
            <div id="orcamentoHealthStatus">Status: aguardando verificação</div>
            <div id="orcamentoChecklist"></div>
            <button class="btn" onclick="verificarOrcamentoAtual()">Verificar orçamento</button>
        </div>

        <div id="printResumo" class="print-area"></div>
        <div id="printOrdem" class="print-area"></div>
        <div id="printEtiqueta" class="thermal-area"></div>
    </div>
</div>

<script>
  window.addEventListener("DOMContentLoaded", () => {
    const botao = document.getElementById("btnPortasTecnico");
    if (!botao) return;
    botao.addEventListener("click", () => {
      const params = new URLSearchParams(window.location.search);
      const uuid = window.ORCAMENTO_UUID || params.get("orcamento_uuid");
      const destino = uuid
        ? `tecnico.html?orcamento_uuid=${encodeURIComponent(uuid)}`
        : "tecnico.html";
      window.location.href = destino;
    });
  });
</script>
</body>
</html>
